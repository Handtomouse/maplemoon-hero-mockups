<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MapleMoon — Mockup 06 — 60/40 Split</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  @font-face {
    font-family: 'P22 Mackinac Pro';
    src: local('P22 Mackinac Pro Book'), local('P22MackinacPro-Book');
    font-weight: 400;
    font-style: normal;
  }
  @font-face {
    font-family: 'P22 Mackinac Pro';
    src: local('P22 Mackinac Pro Medium'), local('P22MackinacPro-Medium');
    font-weight: 500;
    font-style: normal;
  }
  @font-face {
    font-family: 'P22 Mackinac Pro';
    src: local('P22 Mackinac Pro Bold'), local('P22MackinacPro-Bold');
    font-weight: 700;
    font-style: normal;
  }

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --navy: #1E4366;
    --cream: #E7E4CA;
    --cream-light: #F5F3E8;
    --lilac: #D8CFF2;
    --heading: 'P22 Mackinac Pro', Georgia, serif;
    --body: 'Inter', sans-serif;
  }

  body {
    font-family: var(--body);
    overflow-x: hidden;
  }

  /* Nav overlay */
  nav {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 24px 48px;
    z-index: 10;
  }

  .nav-logo img {
    height: 36px;
    opacity: 0.9;
  }

  .nav-links {
    display: flex;
    gap: 36px;
    list-style: none;
  }

  .nav-links a {
    color: var(--cream);
    text-decoration: none;
    font-family: var(--body);
    font-size: 14px;
    font-weight: 400;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    opacity: 0.7;
    transition: opacity 0.3s ease;
  }
  .nav-links a:hover { opacity: 1; }

  /* Hero split */
  .hero {
    display: flex;
    width: 100vw;
    height: 100vh;
    position: relative;
  }

  /* Left panel — Navy 60% */
  .panel-left {
    width: 60%;
    height: 100%;
    background: var(--navy);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  /* Subtle radial glow behind product */
  .panel-left::after {
    content: '';
    position: absolute;
    width: 60%;
    height: 60%;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: radial-gradient(ellipse, rgba(216,207,242,0.07) 0%, transparent 70%);
    pointer-events: none;
  }

  .product-image {
    position: relative;
    z-index: 2;
    max-height: 65vh;
    width: auto;
    filter: drop-shadow(0 24px 64px rgba(0,0,0,0.3));
    transform: rotate(-3deg);
    transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1);
    cursor: pointer;
  }
  .product-image:hover {
    transform: rotate(-3deg) scale(1.05);
  }

  /* Right panel — Cream 40% */
  .panel-right {
    width: 40%;
    height: 100%;
    background: var(--cream-light);
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 60px 56px;
    position: relative;
  }

  .right-wordmark {
    width: 80%;
    max-width: 320px;
    margin-bottom: 40px;
    opacity: 0.85;
    /* Invert the cream SVG to navy for the light background */
    filter: brightness(0) saturate(100%) invert(22%) sepia(30%) saturate(1200%) hue-rotate(175deg) brightness(90%);
  }

  .right-headline {
    font-family: var(--heading);
    font-size: clamp(32px, 3.5vw, 52px);
    font-weight: 500;
    color: var(--navy);
    line-height: 1.15;
    margin-bottom: 20px;
    letter-spacing: -0.01em;
  }

  .right-body {
    font-family: var(--body);
    font-size: clamp(15px, 1.2vw, 18px);
    font-weight: 300;
    color: var(--navy);
    line-height: 1.7;
    opacity: 0.75;
    margin-bottom: 40px;
    max-width: 380px;
  }

  .cta-btn {
    display: inline-block;
    padding: 16px 40px;
    background: var(--navy);
    color: var(--cream);
    font-family: var(--body);
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    text-decoration: none;
    border-radius: 40px;
    border: none;
    cursor: pointer;
    transition: all 0.4s ease;
    box-shadow: 0 4px 24px rgba(30,67,102,0.25);
  }
  .cta-btn:hover {
    background: #15304d;
    box-shadow: 0 6px 32px rgba(30,67,102,0.35);
    transform: translateY(-2px);
  }

  /* Decorative corner accent */
  .panel-right::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    width: 1px;
    height: 100%;
    background: linear-gradient(to bottom, transparent 10%, rgba(30,67,102,0.08) 50%, transparent 90%);
  }

  /* Responsive — stack on mobile */
  @media (max-width: 768px) {
    .hero { flex-direction: column; height: auto; min-height: 100vh; }
    .panel-left { width: 100%; height: 50vh; min-height: 360px; }
    .panel-right { width: 100%; height: auto; min-height: 50vh; padding: 40px 32px 60px; }
    .product-image { max-height: 45vh; }
    nav { padding: 20px 24px; }
    .nav-links { gap: 20px; }
    .nav-links a { font-size: 12px; color: var(--cream); }
    .right-wordmark { width: 60%; margin-bottom: 28px; }
  }
</style>
</head>
<body>

<section class="hero">
  <nav>
    <div class="nav-logo">
      <img src="assets/maplemoon_logo.svg" alt="MapleMoon">
    </div>
    <ul class="nav-links">
      <li><a href="#">Shop</a></li>
      <li><a href="#">Story</a></li>
      <li><a href="#">Stockists</a></li>
      <li><a href="#">Cart</a></li>
    </ul>
  </nav>

  <div class="panel-left">
    <img src="assets/bar_hero_front.png" alt="MapleMoon Pure Carob Bar" class="product-image">
  </div>

  <div class="panel-right">
    <img src="assets/carob_wordmark.svg" alt="CAROB" class="right-wordmark">
    <h1 class="right-headline">Not chocolate.<br>Better.</h1>
    <p class="right-body">Six handcrafted carob bars. Organic ingredients. Made in Australia.</p>
    <a href="#" class="cta-btn">Explore the Range</a>
  </div>
</section>

</body>
</html>
