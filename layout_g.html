<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MapleMoon — Layout G: Mobile Hero</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  @font-face { font-family: 'P22 Mackinac Pro'; font-weight: 400; src: local('P22 Mackinac Pro Book'), local('P22MackinacPro-Book'); }
  @font-face { font-family: 'P22 Mackinac Pro'; font-weight: 500; src: local('P22 Mackinac Pro Medium'), local('P22MackinacPro-Medium'); }
  @font-face { font-family: 'P22 Mackinac Pro'; font-weight: 700; src: local('P22 Mackinac Pro Bold'), local('P22MackinacPro-Bold'); }

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: linear-gradient(180deg, #7B9DBF 0%, #A8BDD4 100%);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Inter', sans-serif;
  }

  /* #19 Page load fade-in */
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* #5 Back link — fixed top-left */
  .back-link {
    position: fixed;
    top: 16px;
    left: 16px;
    color: #E7E4CA;
    opacity: 0.5;
    font-family: 'Inter', sans-serif;
    font-size: 0.75rem;
    text-decoration: none;
    z-index: 101;
    letter-spacing: 0.02em;
  }
  .back-link:hover { opacity: 0.8; }

  /* #11 Focus-visible accessibility */
  a:focus-visible, button:focus-visible, label:focus-visible {
    outline: 2px solid #E7E4CA;
    outline-offset: 3px;
    border-radius: 2px;
  }

  /* #6 Mobile menu checkbox toggle */
  #menu-toggle:checked ~ .mobile-menu {
    opacity: 1;
    pointer-events: auto;
  }

  .mobile-menu {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: #E7E4CA;
    z-index: 100;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 24px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease;
  }
  .mobile-menu a {
    font-family: 'P22 Mackinac Pro', 'Georgia', serif;
    font-size: 1.4rem;
    font-weight: 500;
    color: #1E4366;
    text-decoration: none;
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }
  .mobile-menu .menu-nav-links a {
    font-family: 'Inter', sans-serif;
    font-size: 1rem;
    font-weight: 400;
    text-transform: none;
    letter-spacing: 0.02em;
  }
  .mobile-menu .menu-nav-links {
    margin-top: 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }
  .mobile-menu .menu-close {
    position: absolute;
    top: 20px;
    right: 20px;
    font-size: 1.5rem;
    color: #1E4366;
    cursor: pointer;
    background: none;
    border: none;
    font-family: 'Inter', sans-serif;
  }

  .phone-frame {
    width: 100%;
    max-width: 430px;
    height: 100vh;
    position: relative;
    overflow: hidden;
    background: linear-gradient(180deg, #7B9DBF 0%, #A8BDD4 100%);
  }

  /* Desktop: show as phone mockup */
  /* #17 Breakpoint 768px */
  @media (min-width: 768px) {
    body {
      align-items: center;
      padding: 40px 20px;
    }
    .phone-frame {
      height: 844px;
      border-radius: 40px;
      border: 3px solid rgba(231, 228, 202, 0.15);
      box-shadow: 0 40px 80px rgba(0,0,0,0.2), 0 0 0 1px rgba(255,255,255,0.05);
    }
  }

  /* #17 Breakpoint 1024px */
  @media (min-width: 1024px) {
    .phone-frame {
      max-width: 430px;
    }
  }

  /* Top bar */
  .top-bar {
    position: absolute;
    top: 0; left: 0; right: 0;
    padding: 48px 24px 0;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    z-index: 10;
  }

  /* #6 Hamburger as label */
  .hamburger {
    display: flex;
    flex-direction: column;
    gap: 5px;
    cursor: pointer;
    padding: 4px 0;
    background: none;
    border: none;
  }
  .hamburger span {
    display: block;
    width: 24px;
    height: 2px;
    background: #E7E4CA;
    border-radius: 1px;
  }

  .logo-group {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    /* #19 stagger: logo 0s */
    opacity: 0;
    animation: fadeIn 0.6s ease forwards 0s;
  }
  /* #4 Logo 40px mobile */
  .logo-group img {
    width: 40px;
    height: auto;
  }
  .logo-group .logo-text {
    font-family: 'Inter', sans-serif;
    font-weight: 300;
    font-size: 0.65rem;
    color: #E7E4CA;
    letter-spacing: 0.15em;
    text-transform: lowercase;
  }

  /* #2 CAROB watermark — opacity 0.12 */
  .carob-watermark {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 120%;
    opacity: 0.12;
    pointer-events: none;
    z-index: 1;
    display: block;
    /* #19 stagger: CAROB 0.3s */
    opacity: 0;
    animation: fadeIn 0.6s ease forwards 0.3s;
  }

  /* #3 Product image — mobile drop-shadow */
  .product-container {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -55%);
    z-index: 5;
    display: flex;
    justify-content: center;
    align-items: center;
    /* #19 stagger: product 0.2s */
    opacity: 0;
    animation: fadeIn 0.6s ease forwards 0.2s;
  }
  .product-container img {
    width: 65vw;
    max-width: 280px;
    height: auto;
    filter: drop-shadow(0 16px 32px rgba(0,0,0,0.15));
    /* #18 Product hover */
    transition: transform 0.4s ease, filter 0.4s ease;
  }
  .product-container img:hover {
    transform: scale(1.03);
  }

  /* CAROB label below product */
  .carob-label {
    position: absolute;
    bottom: 22%;
    left: 50%;
    transform: translateX(-50%);
    width: 80vw;
    z-index: 4;
    opacity: 1;
    display: block;
  }

  /* #1 Category strip — uppercase, #8 hover underline, #14 touch targets */
  .category-strip {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 0 24px 40px;
    z-index: 10;
    /* #19 stagger: categories 0.4s */
    opacity: 0;
    animation: fadeIn 0.6s ease forwards 0.4s;
  }
  .category-scroll {
    display: flex;
    gap: 16px;
    overflow-x: auto;
    white-space: nowrap;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    -ms-overflow-style: none;
    padding-bottom: 4px;
    /* #20 scroll-snap */
    scroll-snap-type: x mandatory;
  }
  .category-scroll::-webkit-scrollbar { display: none; }

  .category-scroll a {
    font-family: 'P22 Mackinac Pro', 'Georgia', serif;
    font-weight: 500;
    font-size: 0.9rem;
    color: #E7E4CA;
    text-decoration: none;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    opacity: 0.75;
    flex-shrink: 0;
    transition: opacity 0.2s, border-color 0.2s ease;
    /* #8 hover underline */
    border-bottom: 1.5px solid transparent;
    /* #14 touch target */
    min-height: 44px;
    display: inline-flex;
    align-items: center;
    padding: 8px 12px;
    /* #20 scroll-snap */
    scroll-snap-align: start;
  }
  .category-scroll a:hover {
    opacity: 1;
    border-color: #E7E4CA;
  }

  /* #9 Separator dots */
  .category-scroll .dot {
    font-family: 'P22 Mackinac Pro', 'Georgia', serif;
    font-size: 0.9rem;
    color: #E7E4CA;
    opacity: 0.4;
    pointer-events: none;
    flex-shrink: 0;
    display: inline-flex;
    align-items: center;
  }

  /* #13 Fade hint on the right side of categories */
  .category-strip::after {
    content: '';
    position: absolute;
    right: 0;
    bottom: 40px;
    width: 40px;
    height: 24px;
    background: linear-gradient(to right, transparent, #A8BDD4);
    pointer-events: none;
    z-index: 11;
  }

  /* #17 Desktop breakpoint for logo */
  @media (min-width: 768px) {
    /* #4 Logo 56px desktop */
    .logo-group img {
      width: 56px;
    }
    .product-container img {
      /* #3 Desktop drop-shadow */
      filter: drop-shadow(0 24px 48px rgba(0,0,0,0.18));
    }
  }
</style>
</head>
<body>

<a href="index.html" class="back-link">&larr; Back to Gallery</a>

<!-- #6 Menu toggle checkbox -->
<input type="checkbox" id="menu-toggle" hidden>

<!-- #6 Mobile menu overlay -->
<div class="mobile-menu">
  <label for="menu-toggle" class="menu-close" aria-label="Close menu">&times;</label>
  <a href="#">BARS</a>
  <a href="#">MOONS</a>
  <a href="#">BANANAS</a>
  <a href="#">BITES</a>
  <a href="#">ELIXIRS</a>
  <a href="#">PACKS</a>
  <a href="#">GIFTS</a>
  <div class="menu-nav-links">
    <a href="#">Our Story</a>
    <a href="#">Shop</a>
    <a href="#">Stockists</a>
    <a href="#">Recipes</a>
    <a href="#">Contact</a>
  </div>
</div>

<div class="phone-frame">
  <!-- Top bar -->
  <div class="top-bar">
    <!-- #6 Hamburger as label, #12 aria-expanded -->
    <label for="menu-toggle" class="hamburger" aria-label="Menu" aria-expanded="false" role="button">
      <span></span>
      <span></span>
      <span></span>
    </label>
    <div class="logo-group">
      <img src="assets/maplemoon_logo.svg" alt="MapleMoon">
      <span class="logo-text">maple moon</span>
    </div>
  </div>

  <!-- CAROB watermark -->
  <img class="carob-watermark" src="assets/carob_wordmark.svg" alt="CAROB">

  <!-- Product -->
  <div class="product-container">
    <img src="assets/moon_halfopen.png" alt="MapleMoon Carob Bar — half open">
  </div>

  <!-- CAROB label -->
  <img class="carob-label" src="assets/carob_wordmark.svg" alt="CAROB">

  <!-- #9 Category strip with dot separators, #12 aria-label -->
  <div class="category-strip">
    <div class="category-scroll" aria-label="Product categories" role="navigation">
      <a href="#">BARS</a><span class="dot">&middot;</span>
      <a href="#">MOONS</a><span class="dot">&middot;</span>
      <a href="#">BANANAS</a><span class="dot">&middot;</span>
      <a href="#">BITES</a><span class="dot">&middot;</span>
      <a href="#">ELIXIRS</a><span class="dot">&middot;</span>
      <a href="#">PACKS</a><span class="dot">&middot;</span>
      <a href="#">GIFTS</a>
    </div>
  </div>
</div>

</body>
</html>
