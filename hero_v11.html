<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maple Moon — The Grid (V11)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  @font-face { font-family: 'P22 Mackinac Pro'; font-weight: 400; src: local('P22 Mackinac Pro Book'), local('P22MackinacPro-Book'); }
  @font-face { font-family: 'P22 Mackinac Pro'; font-weight: 500; src: local('P22 Mackinac Pro Medium'), local('P22MackinacPro-Medium'); }
  @font-face { font-family: 'P22 Mackinac Pro'; font-weight: 700; src: local('P22 Mackinac Pro Bold'), local('P22MackinacPro-Bold'); }

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --cream: #E7E4CA;
    --navy: #1E4366;
    --grad-top: #7B9DBF;
    --grad-bottom: #A8BDD4;
    --gap: 4px;
  }

  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: 'Inter', sans-serif;
    color: var(--cream);
    background: #1a1a1a;
    text-rendering: optimizeLegibility;
    overflow-x: hidden;
  }

  /* ── Skip link ── */
  .skip-link {
    position: absolute; top: -100%; left: 16px;
    padding: 8px 16px; background: var(--cream); color: var(--navy);
    border-radius: 4px; z-index: 999; font-size: 0.85rem;
    text-decoration: none;
  }
  .skip-link:focus { top: 8px; }
  :focus-visible { outline: 2px solid var(--cream); outline-offset: 3px; }

  /* ── Back link ── */
  .back-link {
    position: fixed; top: 16px; left: 16px; z-index: 101;
    color: var(--cream); text-decoration: none;
    font-family: 'Inter', sans-serif; font-size: 0.8rem; font-weight: 400;
    opacity: 0.7; transition: opacity 0.2s;
    display: none;
  }
  .back-link:hover { opacity: 1; }

  /* ── Hamburger (mobile only) ── */
  #menu-toggle { display: none; }
  .hamburger {
    position: fixed; top: 12px; left: 12px; z-index: 200;
    cursor: pointer; display: flex; flex-direction: column;
    justify-content: center; gap: 5px; width: 28px; height: 28px;
  }
  .hamburger span {
    display: block; width: 100%; height: 2px;
    background: var(--cream); border-radius: 1px;
    transition: transform 0.3s, opacity 0.3s;
  }
  #menu-toggle:checked ~ .hamburger span:nth-child(1) { transform: rotate(45deg) translate(5px, 5px); }
  #menu-toggle:checked ~ .hamburger span:nth-child(2) { opacity: 0; }
  #menu-toggle:checked ~ .hamburger span:nth-child(3) { transform: rotate(-45deg) translate(5px, -5px); }

  /* ── Mobile menu overlay ── */
  .mobile-menu {
    position: fixed; inset: 0; z-index: 150;
    background: var(--cream); color: var(--navy);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 28px;
    opacity: 0; pointer-events: none;
    transition: opacity 0.35s ease;
  }
  #menu-toggle:checked ~ .mobile-menu { opacity: 1; pointer-events: auto; }
  .mobile-menu a {
    font-family: 'P22 Mackinac Pro', sans-serif; font-size: 1.4rem;
    font-weight: 500; text-transform: uppercase; letter-spacing: 0.12em;
    color: var(--navy); text-decoration: none;
    transition: opacity 0.2s; min-height: 44px; padding: 12px 0;
    display: inline-flex; align-items: center;
  }
  .mobile-menu a:hover { opacity: 0.6; }
  .mobile-menu .menu-divider { width: 40px; height: 1px; background: var(--navy); opacity: 0.2; }
  .mobile-menu .menu-nav {
    display: flex; flex-direction: column; align-items: center; gap: 20px;
    margin-top: 24px; padding-top: 24px;
    border-top: 1px solid rgba(30,67,102,0.15);
  }
  .mobile-menu .menu-nav a {
    font-family: 'Inter', sans-serif; font-size: 0.95rem;
    font-weight: 400; text-transform: none; letter-spacing: 0.02em;
    color: var(--navy); opacity: 0.6;
  }

  /* ── Mobile header (logo) ── */
  .header-mobile {
    position: fixed; top: 0; right: 0; z-index: 100;
    display: flex; justify-content: flex-end; align-items: flex-start;
    padding: 12px;
  }
  .header-mobile .logo-img { width: 36px; height: auto; }

  /* ── Desktop nav bar ── */
  .header-desktop { display: none; }

  /* ── Reduced motion ── */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.01ms !important;
    }
  }

  /* ── Fade-in ── */
  @keyframes fadeIn {
    from { opacity: 0; transform: scale(0.97); }
    to   { opacity: 1; transform: scale(1); }
  }
  .tile { animation: fadeIn 0.5s ease both; }
  .tile:nth-child(1) { animation-delay: 0.05s; }
  .tile:nth-child(2) { animation-delay: 0.1s; }
  .tile:nth-child(3) { animation-delay: 0.15s; }
  .tile:nth-child(4) { animation-delay: 0.2s; }
  .tile:nth-child(5) { animation-delay: 0.25s; }
  .tile:nth-child(6) { animation-delay: 0.3s; }

  /* ═══════════════════════════════════
     V11 — THE GRID (mobile)
  ═══════════════════════════════════ */

  .grid-hero {
    position: relative;
    width: 100vw;
    height: 100vh;
    height: 100dvh;
    padding: var(--gap);
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1.4fr 1fr 1fr;
    gap: var(--gap);
  }

  /* ── CAROB watermark over entire grid ── */
  .grid-watermark {
    position: absolute;
    width: 80%; left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    opacity: 0.05;
    z-index: 5;
    pointer-events: none;
  }

  /* ── Tile base ── */
  .tile {
    border-radius: 8px;
    overflow: hidden;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: transform 0.15s ease;
  }
  .tile:active {
    transform: scale(0.98);
  }

  /* ── Tile 1: Bar hero (spans 2 cols) ── */
  .tile-bar {
    grid-column: 1 / 3;
    background: linear-gradient(180deg, var(--grad-top) 0%, var(--grad-bottom) 100%);
  }
  .tile-bar .tile-product {
    width: 45%; max-width: 200px; height: auto;
    filter: drop-shadow(0 4px 8px rgba(0,0,0,0.1)) drop-shadow(0 12px 24px rgba(0,0,0,0.15));
    position: relative; z-index: 2;
  }
  .tile-bar .tile-label {
    position: absolute; bottom: 12px; left: 0; right: 0;
    text-align: center; z-index: 3;
    font-family: 'P22 Mackinac Pro', sans-serif;
    font-weight: 500; font-size: 0.7rem;
    text-transform: uppercase; letter-spacing: 0.12em;
    color: var(--cream); opacity: 0.7;
  }

  /* ── Tile 2: Moon ── */
  .tile-moon {
    background: linear-gradient(180deg, #6589a8 0%, #7B9DBF 100%);
  }
  .tile-moon .tile-product {
    width: 70%; max-width: 120px; height: auto;
    filter: drop-shadow(0 2px 6px rgba(0,0,0,0.15));
    position: relative; z-index: 2;
  }
  .tile-moon .tile-label {
    position: absolute; bottom: 10px; left: 0; right: 0;
    text-align: center; z-index: 3;
    font-family: 'P22 Mackinac Pro', sans-serif;
    font-weight: 500; font-size: 0.6rem;
    text-transform: uppercase; letter-spacing: 0.1em;
    color: var(--cream); opacity: 0.6;
  }

  /* ── Tile 3: Ingredient/Lifestyle ── */
  .tile-lifestyle {
    background: #3a2a1a;
  }
  .tile-lifestyle .tile-bg {
    position: absolute; inset: 0;
    object-fit: cover; width: 100%; height: 100%;
    z-index: 0;
  }
  .tile-lifestyle .tile-overlay {
    position: absolute; inset: 0;
    background: rgba(180,140,80,0.25);
    z-index: 1;
  }
  .tile-lifestyle .tile-label {
    position: absolute; bottom: 10px; left: 0; right: 0;
    text-align: center; z-index: 3;
    font-family: 'P22 Mackinac Pro', sans-serif;
    font-weight: 500; font-size: 0.6rem;
    text-transform: uppercase; letter-spacing: 0.1em;
    color: var(--cream); opacity: 0.7;
    text-shadow: 0 1px 4px rgba(0,0,0,0.4);
  }

  /* ── Tile 4: CTA / Shop Now ── */
  .tile-cta {
    background: var(--navy);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 8px;
  }
  .tile-cta .cta-text {
    font-family: 'P22 Mackinac Pro', sans-serif;
    font-weight: 500; font-size: 1rem;
    text-transform: uppercase; letter-spacing: 0.12em;
    color: var(--cream);
  }
  .tile-cta .cta-arrow {
    width: 24px; height: 24px;
    fill: none; stroke: var(--cream); stroke-width: 2;
    opacity: 0.6;
  }

  /* ── Tile 5: Origin ── */
  .tile-origin {
    background: var(--cream);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 4px;
  }
  .tile-origin .origin-title {
    font-family: 'P22 Mackinac Pro', sans-serif;
    font-weight: 400; font-size: 1rem;
    color: var(--navy); letter-spacing: 0.06em;
  }
  .tile-origin .origin-sub {
    font-family: 'Inter', sans-serif;
    font-weight: 300; font-size: 0.65rem;
    color: var(--navy); opacity: 0.5;
    letter-spacing: 0.06em;
  }
  .tile-origin .origin-icons {
    display: flex; gap: 8px; margin-top: 6px;
  }
  .tile-origin .origin-icons img {
    width: 18px; height: 18px;
    filter: brightness(0) saturate(100%) invert(20%) sepia(30%) saturate(1200%) hue-rotate(180deg) brightness(60%) contrast(100%);
    opacity: 0.4;
  }

  /* ═══════════════════════════════════
     DESKTOP — 4-col asymmetric bento
  ═══════════════════════════════════ */
  @media (min-width: 768px) {
    :root { --gap: 8px; }

    .hamburger { display: none; }
    .header-mobile { display: none; }
    .back-link { display: block; }

    .header-desktop {
      display: flex; align-items: center;
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      padding: 28px 40px;
    }
    .header-desktop nav {
      flex: 1; display: flex; align-items: center;
      justify-content: center; gap: 40px;
    }
    .header-desktop nav a {
      font-family: 'Inter', sans-serif; font-size: 1rem;
      font-weight: 400; color: var(--cream); text-decoration: none;
      opacity: 0.9; transition: opacity 0.2s;
    }
    .header-desktop nav a:hover { opacity: 0.6; }
    .header-desktop .logo-desktop {
      width: 80px; height: auto; margin-left: auto; flex-shrink: 0;
    }

    .grid-hero {
      grid-template-columns: 2fr 1fr 1fr 1fr;
      grid-template-rows: 1fr 1fr;
      padding: var(--gap);
    }

    /* Reflow tiles for desktop bento */
    .tile-bar {
      grid-column: 1 / 2;
      grid-row: 1 / 3;
    }
    .tile-bar .tile-product {
      width: 55%; max-width: 280px;
    }
    .tile-bar .tile-label { font-size: 0.8rem; bottom: 20px; }

    .tile-moon {
      grid-column: 2 / 3;
      grid-row: 1 / 2;
    }

    .tile-lifestyle {
      grid-column: 3 / 4;
      grid-row: 1 / 2;
    }

    .tile-cta {
      grid-column: 4 / 5;
      grid-row: 1 / 2;
    }

    .tile-origin {
      grid-column: 2 / 3;
      grid-row: 2 / 3;
    }

    /* Extra desktop tiles */
    .tile-trust-desktop {
      display: flex;
      grid-column: 3 / 4;
      grid-row: 2 / 3;
    }
    .tile-powder-desktop {
      display: flex;
      grid-column: 4 / 5;
      grid-row: 2 / 3;
    }

    /* Hover effects */
    .tile {
      transition: transform 0.3s ease;
    }
    .tile:hover {
      transform: scale(1.03);
    }
    .tile:active {
      transform: scale(0.99);
    }

    /* Show overlay text on hover */
    .tile .hover-text {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: rgba(30,67,102,0.5);
      opacity: 0;
      transition: opacity 0.3s;
      z-index: 10;
      font-family: 'P22 Mackinac Pro', sans-serif;
      font-weight: 500; font-size: 0.9rem;
      text-transform: uppercase; letter-spacing: 0.12em;
      color: var(--cream);
    }
    .tile:hover .hover-text {
      opacity: 1;
    }
    /* Don't darken CTA/Origin on hover */
    .tile-cta .hover-text,
    .tile-origin .hover-text { display: none; }
  }

  /* ── Extra tiles: hidden on mobile ── */
  .tile-trust-desktop,
  .tile-powder-desktop {
    display: none;
  }

  .tile-trust-desktop {
    background: linear-gradient(180deg, #5a7fa0 0%, #7B9DBF 100%);
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    border-radius: 8px;
    overflow: hidden;
  }
  .tile-trust-desktop .trust-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    justify-items: center;
  }
  .tile-trust-desktop .trust-grid img {
    width: 28px; height: 28px;
    filter: brightness(0) saturate(100%) invert(91%) sepia(8%) saturate(580%) hue-rotate(18deg) brightness(100%) contrast(88%);
    opacity: 0.7;
  }
  .tile-trust-desktop .trust-label {
    font-family: 'Inter', sans-serif;
    font-weight: 300; font-size: 0.65rem;
    color: var(--cream); opacity: 0.5;
    text-transform: uppercase; letter-spacing: 0.1em;
  }

  .tile-powder-desktop {
    background: linear-gradient(180deg, #8ba1b8 0%, var(--grad-bottom) 100%);
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    border-radius: 8px;
    overflow: hidden;
  }
  .tile-powder-desktop .powder-img {
    width: 60%; max-width: 100px; height: auto;
    filter: drop-shadow(0 2px 6px rgba(0,0,0,0.15));
  }
  .tile-powder-desktop .tile-label {
    font-family: 'P22 Mackinac Pro', sans-serif;
    font-weight: 500; font-size: 0.65rem;
    text-transform: uppercase; letter-spacing: 0.1em;
    color: var(--cream); opacity: 0.6;
  }

  @media (min-width: 1024px) {
    .header-desktop { padding: 32px 48px; }
    .header-desktop nav { gap: 52px; }
  }
</style>
</head>
<body>

<a href="#main" class="skip-link">Skip to content</a>
<a href="#" class="back-link">&larr; Back to Gallery</a>

<input type="checkbox" id="menu-toggle" hidden>
<label for="menu-toggle" class="hamburger" aria-label="Menu">
  <span></span><span></span><span></span>
</label>

<div class="mobile-menu">
  <a href="#">Bars</a>
  <a href="#">Moons</a>
  <a href="#">Bananas</a>
  <a href="#">Bites</a>
  <a href="#">Elixirs</a>
  <a href="#">Packs</a>
  <a href="#">Gifts</a>
  <div class="menu-divider"></div>
  <div class="menu-nav">
    <a href="#">Our Story</a>
    <a href="#">Shop</a>
    <a href="#">Stockists</a>
    <a href="#">Recipes</a>
    <a href="#">Contact</a>
  </div>
</div>

<!-- Mobile header -->
<header class="header-mobile">
  <img src="assets/maplemoon_logo.svg" alt="Maple Moon" class="logo-img" width="36" height="36" loading="lazy" decoding="async">
</header>

<!-- Desktop header -->
<header class="header-desktop">
  <nav>
    <a href="#">Our Story</a>
    <a href="#">Shop</a>
    <a href="#">Stockists</a>
    <a href="#">Recipes</a>
    <a href="#">Contact</a>
  </nav>
  <img src="assets/maplemoon_logo.svg" alt="Maple Moon" class="logo-desktop" width="80" height="40" loading="lazy" decoding="async">
</header>

<!-- ═══ THE GRID ═══ -->
<main class="grid-hero" id="main">

  <!-- CAROB watermark over entire grid -->
  <img src="assets/carob_wordmark.svg" alt="" class="grid-watermark" aria-hidden="true" width="800" height="200" loading="lazy" decoding="async">

  <!-- Tile 1: Bar Hero (spans 2 cols on mobile) -->
  <a href="#" class="tile tile-bar" aria-label="Shop Bars">
    <img src="assets/bar_hero_front.png" alt="Maple Moon Carob Bar" class="tile-product" width="400" height="600" fetchpriority="high" decoding="sync">
    <span class="tile-label">Bars</span>
    <span class="hover-text">Shop Bars</span>
  </a>

  <!-- Tile 2: Moon -->
  <a href="#" class="tile tile-moon" aria-label="Shop Moons">
    <img src="assets/moon_halfopen.png" alt="Carob Moon" class="tile-product" width="300" height="300" loading="lazy" decoding="async">
    <span class="tile-label">Moons</span>
    <span class="hover-text">Shop Moons</span>
  </a>

  <!-- Tile 3: Lifestyle / Ingredient -->
  <a href="#" class="tile tile-lifestyle" aria-label="Our Story">
    <img src="assets/bar_lifestyle.png" alt="" class="tile-bg" aria-hidden="true" width="800" height="600" loading="lazy" decoding="async">
    <div class="tile-overlay"></div>
    <span class="tile-label">Our Story</span>
    <span class="hover-text">Our Story</span>
  </a>

  <!-- Tile 4: CTA -->
  <a href="#" class="tile tile-cta" aria-label="Shop Now">
    <span class="cta-text">Shop Now</span>
    <svg class="cta-arrow" viewBox="0 0 24 24"><polyline points="9 6 15 12 9 18"></polyline></svg>
  </a>

  <!-- Tile 5: Origin -->
  <a href="#" class="tile tile-origin" aria-label="Byron Bay">
    <span class="origin-title">Byron Bay</span>
    <span class="origin-sub">Est. 2022</span>
    <div class="origin-icons">
      <img src="assets/icon_organic.svg" alt="Organic" width="18" height="18">
      <img src="assets/icon_vegan.svg" alt="Vegan" width="18" height="18">
      <img src="assets/icon_made_in_aus.svg" alt="Made in Aus" width="18" height="18">
    </div>
  </a>

  <!-- Desktop-only: Trust tile -->
  <div class="tile tile-trust-desktop" aria-label="Certifications">
    <div class="trust-grid">
      <img src="assets/icon_organic.svg" alt="Organic" width="28" height="28">
      <img src="assets/icon_vegan.svg" alt="Vegan" width="28" height="28">
      <img src="assets/icon_caffeine_free.svg" alt="Caffeine Free" width="28" height="28">
      <img src="assets/icon_gluten_free.svg" alt="Gluten Free" width="28" height="28">
      <img src="assets/icon_made_in_aus.svg" alt="Made in Aus" width="28" height="28">
    </div>
    <span class="trust-label">Certified</span>
    <span class="hover-text">Certifications</span>
  </div>

  <!-- Desktop-only: Powder/Apparel tile -->
  <div class="tile tile-powder-desktop" aria-label="Carob Powder">
    <img src="assets/bar_pcar_front.png" alt="Carob Powder" class="powder-img" width="200" height="300" loading="lazy" decoding="async">
    <span class="tile-label">More</span>
    <span class="hover-text">Explore More</span>
  </div>

</main>

<script>
(function() {
  // Menu auto-close
  var toggle = document.getElementById('menu-toggle');
  document.querySelectorAll('.mobile-menu a').forEach(function(link) {
    link.addEventListener('click', function() { toggle.checked = false; });
  });

  // Focus trap
  var menu = document.querySelector('.mobile-menu');
  toggle.addEventListener('change', function() {
    if (!toggle.checked) return;
    var focusable = menu.querySelectorAll('a, button, [tabindex]');
    if (!focusable.length) return;
    var first = focusable[0], last = focusable[focusable.length - 1];
    function trap(e) {
      if (e.key === 'Escape') { toggle.checked = false; return; }
      if (e.key !== 'Tab') return;
      if (e.shiftKey) { if (document.activeElement === first) { e.preventDefault(); last.focus(); } }
      else { if (document.activeElement === last) { e.preventDefault(); first.focus(); } }
    }
    menu.addEventListener('keydown', trap);
    first.focus();
    var observer = new MutationObserver(function() {
      if (!toggle.checked) { menu.removeEventListener('keydown', trap); observer.disconnect(); }
    });
    observer.observe(toggle, { attributes: true });
  });
})();
</script>

</body>
</html>
