<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MapleMoon — Mockup 02 — Video BG + Bottom-Left Headline</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  @font-face {
    font-family: 'P22 Mackinac Pro';
    src: local('P22 Mackinac Pro Book'), local('P22MackinacPro-Book');
    font-weight: 400;
    font-style: normal;
  }
  @font-face {
    font-family: 'P22 Mackinac Pro';
    src: local('P22 Mackinac Pro Medium'), local('P22MackinacPro-Medium');
    font-weight: 500;
    font-style: normal;
  }
  @font-face {
    font-family: 'P22 Mackinac Pro';
    src: local('P22 Mackinac Pro Bold'), local('P22MackinacPro-Bold');
    font-weight: 700;
    font-style: normal;
  }

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --navy: #1E4366;
    --cream: #E7E4CA;
    --cream-light: #F5F3E8;
    --lilac: #D8CFF2;
    --heading: 'P22 Mackinac Pro', Georgia, serif;
    --body: 'Inter', sans-serif;
  }

  body {
    font-family: var(--body);
    color: var(--cream);
    overflow-x: hidden;
  }

  .hero {
    position: relative;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    background: var(--navy);
  }

  /* Lifestyle background image */
  .hero-bg-image {
    position: absolute;
    inset: 0;
    background: url('assets/bar_lifestyle.png') center center / cover no-repeat;
    opacity: 0.25;
    z-index: 0;
  }

  /* Animated gradient simulating atmospheric video */
  .hero::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(
      135deg,
      #1E4366 0%,
      #162f4a 15%,
      #1a3a5a 25%,
      #0f2740 35%,
      #1E4366 50%,
      #243d5a 60%,
      #152e48 75%,
      #1a3856 85%,
      #1E4366 100%
    );
    background-size: 400% 400%;
    animation: gradientShift 20s ease infinite;
    z-index: 0;
  }

  .hero::after {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 20% 80%, rgba(216,207,242,0.06) 0%, transparent 60%),
      radial-gradient(ellipse 60% 80% at 80% 50%, rgba(231,228,202,0.04) 0%, transparent 50%),
      radial-gradient(ellipse 100% 50% at 50% 100%, rgba(30,67,102,0.5) 0%, transparent 70%);
    z-index: 1;
  }

  @keyframes gradientShift {
    0%   { background-position: 0% 50%; }
    25%  { background-position: 100% 25%; }
    50%  { background-position: 100% 75%; }
    75%  { background-position: 0% 100%; }
    100% { background-position: 0% 50%; }
  }

  /* Back link */
  .back-link {
    position: absolute;
    top: 28px;
    left: 32px;
    z-index: 10;
    color: var(--cream);
    text-decoration: none;
    font-family: var(--body);
    font-size: 13px;
    font-weight: 400;
    letter-spacing: 0.03em;
    opacity: 0.6;
    transition: opacity 0.3s ease;
  }
  .back-link:hover { opacity: 1; }

  /* Nav */
  nav {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 24px 48px;
    z-index: 10;
  }

  .nav-logo img {
    height: 36px;
    opacity: 0.9;
  }

  .nav-links {
    display: flex;
    gap: 36px;
    list-style: none;
  }

  .nav-links a {
    color: var(--cream);
    text-decoration: none;
    font-family: var(--body);
    font-size: 14px;
    font-weight: 400;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    opacity: 0.7;
    transition: opacity 0.3s ease;
  }
  .nav-links a:hover { opacity: 1; }

  /* Bottom-left content block */
  .hero-content {
    position: absolute;
    bottom: 100px;
    left: 48px;
    z-index: 5;
    max-width: 65vw;
  }

  .wordmark-svg {
    display: block;
    max-width: 60vw;
    width: 100%;
    opacity: 0.7;
    margin-bottom: 20px;
  }

  .tagline {
    font-family: var(--body);
    font-size: clamp(16px, 2vw, 22px);
    font-weight: 300;
    letter-spacing: 0.08em;
    color: var(--cream);
    opacity: 0.8;
    margin-bottom: 32px;
  }

  .cta-btn {
    display: inline-block;
    padding: 14px 40px;
    border: 1.5px solid var(--cream);
    color: var(--cream);
    font-family: var(--body);
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    text-decoration: none;
    background: transparent;
    transition: all 0.4s ease;
    cursor: pointer;
  }
  .cta-btn:hover {
    background: var(--cream);
    color: var(--navy);
  }

  /* Floating product bar */
  .floating-bar {
    position: absolute;
    right: 8vw;
    top: 50%;
    transform: translateY(-50%);
    z-index: 5;
    animation: floatBar 4s ease-in-out infinite;
  }

  .floating-bar img {
    height: clamp(320px, 50vh, 520px);
    filter: drop-shadow(0 20px 60px rgba(0,0,0,0.35));
    transform: rotate(-4deg);
  }

  @keyframes floatBar {
    0%, 100% { transform: translateY(-50%) translateX(0); }
    50%      { transform: translateY(calc(-50% - 14px)) translateX(3px); }
  }

  /* Trust badge strip */
  .trust-strip {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 5;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 48px;
    padding: 18px 48px;
    background: linear-gradient(to top, rgba(14,30,48,0.6) 0%, transparent 100%);
  }

  .trust-badge {
    display: flex;
    align-items: center;
    gap: 8px;
    opacity: 0.5;
    transition: opacity 0.3s ease;
  }
  .trust-badge:hover { opacity: 0.8; }

  .trust-badge img {
    width: 22px;
    height: 22px;
    filter: brightness(0) invert(0.9);
  }

  .trust-badge span {
    font-family: var(--body);
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--cream);
  }

  /* Responsive */
  @media (max-width: 768px) {
    nav { padding: 20px 24px; }
    .nav-links { gap: 20px; }
    .nav-links a { font-size: 12px; }
    .hero-content { left: 24px; bottom: 80px; max-width: 80vw; }
    .wordmark-svg { max-width: 80vw; }
    .floating-bar { right: -5vw; }
    .floating-bar img { height: 280px; }
    .trust-strip { gap: 20px; padding: 14px 20px; flex-wrap: wrap; }
    .trust-badge span { display: none; }
    .back-link { left: 24px; top: 22px; }
  }
</style>
</head>
<body>

<section class="hero">
  <div class="hero-bg-image"></div>
  <a href="index.html" class="back-link">&larr; Back to Gallery</a>

  <nav>
    <div class="nav-logo">
      <img src="assets/maplemoon_logo.svg" alt="MapleMoon">
    </div>
    <ul class="nav-links">
      <li><a href="#">Shop</a></li>
      <li><a href="#">Story</a></li>
      <li><a href="#">Stockists</a></li>
      <li><a href="#">Cart</a></li>
    </ul>
  </nav>

  <div class="hero-content">
    <img src="assets/carob_wordmark.svg" alt="CAROB" class="wordmark-svg">
    <p class="tagline">Artisan Carob. Not Chocolate.</p>
    <a href="#" class="cta-btn">Shop the Range</a>
  </div>

  <div class="floating-bar">
    <img src="assets/bar_hero_front.png" alt="MapleMoon Pure Carob Bar">
  </div>

  <div class="trust-strip">
    <div class="trust-badge">
      <img src="assets/icon_caffeine_free.svg" alt="">
      <span>Caffeine Free</span>
    </div>
    <div class="trust-badge">
      <img src="assets/icon_gluten_free.svg" alt="">
      <span>Gluten Free</span>
    </div>
    <div class="trust-badge">
      <img src="assets/icon_vegan.svg" alt="">
      <span>Vegan</span>
    </div>
    <div class="trust-badge">
      <img src="assets/icon_organic.svg" alt="">
      <span>Organic</span>
    </div>
    <div class="trust-badge">
      <img src="assets/icon_made_in_aus.svg" alt="">
      <span>Made in Australia</span>
    </div>
  </div>
</section>

</body>
</html>
