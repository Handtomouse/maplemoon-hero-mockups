<html lang="en-AU">
<head>

<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --cream: #E7E4CA;
    --navy: #1E4366;
    --grad-top: #7B9DBF;
    --grad-bottom: #A8BDD4;
  }

  html, body { height: 100%; overflow: hidden; }

  body {
    background: linear-gradient(180deg, var(--grad-top) 0%, var(--grad-bottom) 100%);
    font-family: var(--mm-serif);
    color: var(--cream);
    position: relative;
    min-height: 100vh;
    min-height: 100dvh;
    text-rendering: optimizeLegibility;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at 30% 20%, rgba(139,180,212,0.4) 0%, transparent 60%);
    z-index: 0;
    pointer-events: none;
  }

  /* skip-link, focus-visible → brand_kit.css */

  /* ── Fade-in ── */
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  /* ── Product image entrance (scale-up) ── */
  @keyframes productEntrance {
    from { opacity: 0; transform: scale(0.95); }
    to   { opacity: 1; transform: scale(1); }
  }
  .fade-1 { animation: fadeIn 0.6s ease both 0.1s; }
  .fade-2 { animation: fadeIn 0.6s ease both 0.25s; }
  .fade-product { animation: productEntrance 0.6s ease-out both 0.3s; }
  .fade-3 { animation: fadeIn 0.6s ease both 0.4s; }
  .fade-4 { animation: fadeIn 0.6s ease both 0.55s; }
  .fade-5 { animation: fadeIn 0.6s ease both 0.7s; }

  /* ── Staggered category entrance ── */
  @keyframes catFadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .cat-stagger-1 { animation: catFadeIn 0.4s ease both 0.3s; }
  .cat-stagger-2 { animation: catFadeIn 0.4s ease both 0.35s; }
  .cat-stagger-3 { animation: catFadeIn 0.4s ease both 0.4s; }
  .cat-stagger-4 { animation: catFadeIn 0.4s ease both 0.45s; }
  .cat-stagger-5 { animation: catFadeIn 0.4s ease both 0.5s; }
  .cat-stagger-6 { animation: catFadeIn 0.4s ease both 0.55s; }
  .cat-stagger-7 { animation: catFadeIn 0.4s ease both 0.6s; }

  /* reduced-motion → brand_kit.css */

  /* ── Back link ── */
  .back-link {
    position: fixed; top: 12px; left: 12px; z-index: 101;
    color: var(--cream); text-decoration: none;
    font-family: var(--mm-sans); font-size: 0.8rem; font-weight: 400;
    opacity: 0.7; transition: opacity 0.2s;
    display: none; min-height: 44px; padding: 12px 16px;
  }
  .back-link:hover { opacity: 1; }

  /* ── Hamburger (mobile only) ── */
  #menu-toggle { display: none; }

  .hamburger {
    position: fixed; top: 12px; left: 12px; z-index: 200;
    cursor: pointer; display: flex; flex-direction: column;
    justify-content: center; gap: 5px; width: 44px; height: 44px;
    padding: 8px;
  }
  .hamburger span {
    display: block; width: 100%; height: 2px;
    background: var(--cream); border-radius: 1px;
    transition: transform 0.3s, opacity 0.3s;
  }
  #menu-toggle:checked ~ .hamburger span:nth-child(1) { transform: rotate(45deg) translate(5px, 5px); }
  #menu-toggle:checked ~ .hamburger span:nth-child(2) { opacity: 0; }
  #menu-toggle:checked ~ .hamburger span:nth-child(3) { transform: rotate(-45deg) translate(5px, -5px); }

  /* ── Mobile menu overlay ── */
  .mobile-menu {
    position: fixed; inset: 0; z-index: 150;
    background: var(--cream); color: var(--navy);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 28px;
    opacity: 0; pointer-events: none;
    transition: opacity 0.3s ease;
  }
  #menu-toggle:checked ~ .mobile-menu { opacity: 1; pointer-events: auto; }

  .mobile-menu a {
    font-family: var(--mm-serif); font-size: 1.4rem;
    font-weight: 500; text-transform: uppercase; letter-spacing: 0.12em;
    color: var(--navy); text-decoration: none;
    transition: opacity 0.2s;
    min-height: 44px; padding: 12px 0;
    display: inline-flex; align-items: center;
  }
  .mobile-menu a:hover { opacity: 0.6; }

  .mobile-menu .menu-divider {
    width: 40px; height: 1px; background: var(--navy); opacity: 0.2;
  }

  .mobile-menu .menu-nav {
    display: flex; flex-direction: column; align-items: center; gap: 20px;
    margin-top: 24px; padding-top: 24px;
    border-top: 1px solid var(--mm-navy-15);
  }
  .mobile-menu .menu-nav a {
    font-family: var(--mm-sans); font-size: 0.95rem;
    font-weight: 400; text-transform: none; letter-spacing: 0.02em;
    color: var(--navy); opacity: 0.6;
  }

  /* ── Header ── */
  .header {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; justify-content: flex-end; align-items: flex-start;
    padding: 20px;
  }
  .logo-group {
    display: flex; flex-direction: column; align-items: center; gap: 4px;
  }
  .logo-group img { width: 40px; height: auto; }
  .logo-group span {
    font-family: var(--mm-serif); font-size: 0.55rem;
    text-transform: uppercase; letter-spacing: 0.18em; color: var(--cream);
    opacity: 0.8;
  }

  /* ── Main layout (mobile) ── */
  .hero {
    position: relative; width: 100%; height: 100vh; height: 100dvh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    overflow: hidden;
  }

  .product-img {
    width: 60%; max-width: 260px; height: auto;
    filter: drop-shadow(0 4px 8px var(--mm-black-10)) drop-shadow(0 16px 32px var(--mm-black-15)) drop-shadow(0 32px 64px var(--mm-black-10));
    position: relative; z-index: 2;
  }

  /* ── Categories (mobile): horizontal scroll strip ── */
  .category-strip-mobile {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 50;
    padding: 18px 0 28px;
    overflow-x: auto; overflow-y: hidden;
    white-space: nowrap;
    -webkit-overflow-scrolling: touch;
    scroll-snap-type: x mandatory;
    mask-image: linear-gradient(to right, transparent 0%, black 8%, black 85%, transparent 100%);
    -webkit-mask-image: linear-gradient(to right, transparent 0%, black 8%, black 85%, transparent 100%);
    text-align: center;
  }
  .category-strip-mobile .inner {
    display: inline-flex; align-items: center; gap: 0;
    padding: 0 24px;
  }
  .category-strip-mobile a {
    scroll-snap-align: center;
    font-family: var(--mm-serif); font-size: 0.75rem;
    font-weight: 500; text-transform: uppercase; letter-spacing: 0.12em;
    color: var(--cream); text-decoration: none;
    padding: 10px 0; min-height: 44px; white-space: nowrap;
    transition: opacity 0.2s;
    display: inline-flex; align-items: center;
    font-feature-settings: 'kern' 1, 'liga' 1;
  }
  .category-strip-mobile a:hover { opacity: 0.7; }
  .category-strip-mobile .dot {
    display: inline-block; width: 4px; height: 4px;
    background: var(--cream); border-radius: var(--radius-full);
    margin: 0 12px; opacity: 0.5; flex-shrink: 0;
  }

  /* ── Category strip scroll indicator ── */
  .strip-progress {
    position: fixed; bottom: 0; left: 0; z-index: 51;
    height: 2px; width: 0%;
    background: var(--cream); opacity: 0.3;
    transition: width 0.1s linear;
  }

  /* ── Desktop categories (left stack) ── */
  .category-stack-desktop {
    display: none;
  }

  /* ── DESKTOP ── */
  @media (min-width: 768px) {
    .hamburger { display: none; }
    .category-strip-mobile { display: none; }
    .back-link { display: block; }

    .header {
      padding: 32px 40px;
      transition: background 0.3s ease, backdrop-filter 0.3s ease;
    }
    .header.scrolled {
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      background: rgba(123, 157, 191, 0.6);
      border-bottom: 1px solid var(--mm-cream-10);
    }
    @supports not (backdrop-filter: blur(1px)) {
      .header.scrolled { background: rgba(123, 157, 191, 0.85); }
    }
    .logo-group img { width: 80px; }
    .logo-group span { font-size: 0.65rem; }

    /* Desktop categories */
    .category-stack-desktop {
      display: flex; flex-direction: column; gap: 4px;
      position: fixed; top: 50%; left: 40px; z-index: 50;
      transform: translateY(-50%);
    }
    .category-stack-desktop a {
      font-family: var(--mm-serif);
      font-size: 1.5rem; font-weight: 500;
      text-transform: uppercase; letter-spacing: 0.12em;
      line-height: 2.0; color: var(--cream);
      text-decoration: none; transition: opacity 0.2s;
      font-feature-settings: 'kern' 1, 'liga' 1;
    }
    .category-stack-desktop a:hover { opacity: 0.65; }

    /* Product */
    .product-img {
      width: 22vw; min-width: 280px; max-width: 380px;
      position: absolute;
      bottom: 10vw; left: 50%;
      transform: translateX(-50%);
      filter: drop-shadow(0 4px 8px var(--mm-black-10)) drop-shadow(0 16px 32px var(--mm-black-15)) drop-shadow(0 32px 64px var(--mm-black-10));
    }

    @media (prefers-reduced-motion: no-preference) {
      .product-img { animation: float 3s ease-in-out infinite; will-change: transform; }
    }

    @keyframes float {
      0%, 100% { transform: translateX(-50%) translateY(0); }
      50%      { transform: translateX(-50%) translateY(-8px); }
    }

    /* CAROB wordmark desktop */
  }

  @media (min-width: 1024px) {
    .category-stack-desktop a { font-size: 2rem; }
    .header { padding: 36px 48px; }
  }
</style>
</head>
<body>

<!-- Hamburger auto-close on link tap + focus trap + glassmorphism scroll -->
<script>
(function() {
  var toggle = document.getElementById('menu-toggle');
  var menu = document.querySelector('.mobile-menu');

  // Auto-close on link tap
  document.querySelectorAll('.mobile-menu a').forEach(function(link) {
    link.addEventListener('click', function() { toggle.checked = false; });
  });

  // Focus trap on mobile menu
  toggle.addEventListener('change', function() {
    if (!toggle.checked) return;
    var focusable = menu.querySelectorAll('a, button, [tabindex]');
    if (!focusable.length) return;
    var first = focusable[0], last = focusable[focusable.length - 1];
    function trap(e) {
      if (e.key === 'Escape') { toggle.checked = false; return; }
      if (e.key !== 'Tab') return;
      if (e.shiftKey) { if (document.activeElement === first) { e.preventDefault(); last.focus(); } }
      else { if (document.activeElement === last) { e.preventDefault(); first.focus(); } }
    }
    menu.addEventListener('keydown', trap);
    first.focus();
    var observer = new MutationObserver(function() {
      if (!toggle.checked) { menu.removeEventListener('keydown', trap); observer.disconnect(); }
    });
    observer.observe(toggle, { attributes: true });
  });

  // Glassmorphism nav on scroll (desktop)
  var header = document.querySelector('.header');
  if (header) {
    window.addEventListener('scroll', function() {
      if (window.scrollY > 60) { header.classList.add('scrolled'); }
      else { header.classList.remove('scrolled'); }
    }, { passive: true });
  }
})();
</script>


<!-- Category strip scroll indicator -->
<script>
(function() {
  var strip = document.querySelector('.category-strip-mobile');
  var bar = document.getElementById('stripProgress');
  if (!strip || !bar) return;
  var ticking = false;
  strip.addEventListener('scroll', function() {
    if (!ticking) {
      requestAnimationFrame(function() {
        var maxScroll = strip.scrollWidth - strip.clientWidth;
        if (maxScroll <= 0) { bar.style.width = '0%'; ticking = false; return; }
        var pct = (strip.scrollLeft / maxScroll) * 100;
        bar.style.width = pct + '%';
        ticking = false;
      });
      ticking = true;
    }
  }, { passive: true });
})();
</script>
