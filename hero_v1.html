<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maple Moon — Carob</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  @font-face { font-family: 'P22 Mackinac Pro'; font-weight: 400; src: local('P22 Mackinac Pro Book'), local('P22MackinacPro-Book'); }
  @font-face { font-family: 'P22 Mackinac Pro'; font-weight: 500; src: local('P22 Mackinac Pro Medium'), local('P22MackinacPro-Medium'); }
  @font-face { font-family: 'P22 Mackinac Pro'; font-weight: 700; src: local('P22 Mackinac Pro Bold'), local('P22MackinacPro-Bold'); }

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --cream: #E7E4CA;
    --navy: #1E4366;
    --grad-top: #7B9DBF;
    --grad-bottom: #A8BDD4;
  }

  html, body { height: 100%; overflow: hidden; }

  body {
    background: linear-gradient(180deg, var(--grad-top) 0%, var(--grad-bottom) 100%);
    font-family: 'P22 Mackinac Pro', 'Inter', sans-serif;
    color: var(--cream);
    position: relative;
    min-height: 100vh;
    min-height: 100dvh;
  }

  /* ── Focus ── */
  :focus-visible { outline: 2px solid var(--cream); outline-offset: 3px; }

  /* ── Fade-in ── */
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .fade-1 { animation: fadeIn 0.6s ease both 0.1s; }
  .fade-2 { animation: fadeIn 0.6s ease both 0.25s; }
  .fade-3 { animation: fadeIn 0.6s ease both 0.4s; }
  .fade-4 { animation: fadeIn 0.6s ease both 0.55s; }
  .fade-5 { animation: fadeIn 0.6s ease both 0.7s; }

  /* ── Back link ── */
  .back-link {
    position: fixed; top: 16px; left: 16px; z-index: 101;
    color: var(--cream); text-decoration: none;
    font-family: 'Inter', sans-serif; font-size: 0.8rem; font-weight: 400;
    opacity: 0.7; transition: opacity 0.2s;
    display: none;
  }
  .back-link:hover { opacity: 1; }

  /* ── Hamburger (mobile only) ── */
  #menu-toggle { display: none; }

  .hamburger {
    position: fixed; top: 20px; left: 20px; z-index: 200;
    cursor: pointer; display: flex; flex-direction: column;
    justify-content: center; gap: 5px; width: 28px; height: 28px;
  }
  .hamburger span {
    display: block; width: 100%; height: 2px;
    background: var(--cream); border-radius: 1px;
    transition: transform 0.3s, opacity 0.3s;
  }
  #menu-toggle:checked ~ .hamburger span:nth-child(1) { transform: rotate(45deg) translate(5px, 5px); }
  #menu-toggle:checked ~ .hamburger span:nth-child(2) { opacity: 0; }
  #menu-toggle:checked ~ .hamburger span:nth-child(3) { transform: rotate(-45deg) translate(5px, -5px); }

  /* ── Mobile menu overlay ── */
  .mobile-menu {
    position: fixed; inset: 0; z-index: 150;
    background: var(--cream); color: var(--navy);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 28px;
    opacity: 0; pointer-events: none;
    transition: opacity 0.35s ease;
  }
  #menu-toggle:checked ~ .mobile-menu { opacity: 1; pointer-events: auto; }

  .mobile-menu a {
    font-family: 'P22 Mackinac Pro', sans-serif; font-size: 1.4rem;
    font-weight: 500; text-transform: uppercase; letter-spacing: 0.12em;
    color: var(--navy); text-decoration: none;
    transition: opacity 0.2s;
  }
  .mobile-menu a:hover { opacity: 0.6; }

  .mobile-menu .menu-divider {
    width: 40px; height: 1px; background: var(--navy); opacity: 0.2;
  }

  .mobile-menu .menu-nav {
    display: flex; flex-direction: column; align-items: center; gap: 20px;
    margin-top: 24px; padding-top: 24px;
    border-top: 1px solid rgba(30,67,102,0.15);
  }
  .mobile-menu .menu-nav a {
    font-family: 'Inter', sans-serif; font-size: 0.95rem;
    font-weight: 400; text-transform: none; letter-spacing: 0.02em;
    color: var(--navy); opacity: 0.6;
  }

  /* ── Header ── */
  .header {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; justify-content: flex-end; align-items: flex-start;
    padding: 20px;
  }
  .logo-group {
    display: flex; flex-direction: column; align-items: center; gap: 4px;
  }
  .logo-group img { width: 40px; height: auto; }
  .logo-group span {
    font-family: 'P22 Mackinac Pro', sans-serif; font-size: 0.55rem;
    text-transform: uppercase; letter-spacing: 0.18em; color: var(--cream);
    opacity: 0.8;
  }

  /* ── Main layout (mobile) ── */
  .hero {
    position: relative; width: 100%; height: 100vh; height: 100dvh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    overflow: hidden;
  }

  .product-img {
    width: 60%; max-width: 260px; height: auto;
    filter: drop-shadow(0 16px 32px rgba(0,0,0,0.15));
    position: relative; z-index: 2;
  }

  .carob-wordmark-mobile {
    width: 90%; max-width: 360px; height: auto;
    margin-top: 16px;
    position: relative; z-index: 1;
  }

  .carob-wordmark-desktop {
    display: none;
  }

  /* ── Categories (mobile): horizontal scroll strip ── */
  .category-strip-mobile {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 50;
    padding: 18px 0 28px;
    overflow-x: auto; overflow-y: hidden;
    white-space: nowrap;
    -webkit-overflow-scrolling: touch;
    scroll-snap-type: x mandatory;
    mask-image: linear-gradient(to right, transparent 0%, black 8%, black 85%, transparent 100%);
    -webkit-mask-image: linear-gradient(to right, transparent 0%, black 8%, black 85%, transparent 100%);
    text-align: center;
  }
  .category-strip-mobile .inner {
    display: inline-flex; align-items: center; gap: 0;
    padding: 0 24px;
  }
  .category-strip-mobile a {
    scroll-snap-align: center;
    font-family: 'P22 Mackinac Pro', sans-serif; font-size: 0.75rem;
    font-weight: 500; text-transform: uppercase; letter-spacing: 0.12em;
    color: var(--cream); text-decoration: none;
    padding: 4px 0; white-space: nowrap;
    transition: opacity 0.2s;
  }
  .category-strip-mobile a:hover { opacity: 0.7; }
  .category-strip-mobile .dot {
    display: inline-block; width: 4px; height: 4px;
    background: var(--cream); border-radius: 50%;
    margin: 0 12px; opacity: 0.5; flex-shrink: 0;
  }

  /* ── Desktop categories (left stack) ── */
  .category-stack-desktop {
    display: none;
  }

  /* ── DESKTOP ── */
  @media (min-width: 768px) {
    .hamburger { display: none; }
    .category-strip-mobile { display: none; }
    .carob-wordmark-mobile { display: none; }
    .back-link { display: block; }

    .header { padding: 32px 40px; }
    .logo-group img { width: 80px; }
    .logo-group span { font-size: 0.65rem; }

    /* Desktop categories */
    .category-stack-desktop {
      display: flex; flex-direction: column; gap: 4px;
      position: fixed; top: 50%; left: 40px; z-index: 50;
      transform: translateY(-50%);
    }
    .category-stack-desktop a {
      font-family: 'P22 Mackinac Pro', sans-serif;
      font-size: 1.5rem; font-weight: 500;
      text-transform: uppercase; letter-spacing: 0.12em;
      line-height: 2.0; color: var(--cream);
      text-decoration: none; transition: opacity 0.2s;
    }
    .category-stack-desktop a:hover { opacity: 0.65; }

    /* Product */
    .product-img {
      width: 22vw; min-width: 280px; max-width: 380px;
      position: absolute;
      bottom: 10vw; left: 50%;
      transform: translateX(-50%);
      filter: drop-shadow(0 24px 48px rgba(0,0,0,0.18));
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateX(-50%) translateY(0); }
      50%      { transform: translateX(-50%) translateY(-8px); }
    }

    /* CAROB wordmark desktop */
    .carob-wordmark-desktop {
      display: block;
      width: 100vw; height: auto;
      position: absolute; bottom: -3vw; left: 0;
      z-index: 1;
    }
  }

  @media (min-width: 1024px) {
    .category-stack-desktop a { font-size: 2rem; }
    .header { padding: 36px 48px; }
  }
</style>
</head>
<body>

<a href="#" class="back-link fade-1">&larr; Back to Gallery</a>

<input type="checkbox" id="menu-toggle" hidden>
<label for="menu-toggle" class="hamburger fade-1" aria-label="Menu">
  <span></span><span></span><span></span>
</label>

<div class="mobile-menu">
  <a href="#">Bars</a>
  <a href="#">Moons</a>
  <a href="#">Bananas</a>
  <a href="#">Bites</a>
  <a href="#">Elixirs</a>
  <a href="#">Packs</a>
  <a href="#">Gifts</a>
  <div class="menu-divider"></div>
  <div class="menu-nav">
    <a href="#">Our Story</a>
    <a href="#">Shop</a>
    <a href="#">Stockists</a>
    <a href="#">Recipes</a>
    <a href="#">Contact</a>
  </div>
</div>

<header class="header fade-1">
  <div class="logo-group">
    <img src="assets/maplemoon_logo.svg" alt="Maple Moon">
    <span>maple moon</span>
  </div>
</header>

<nav class="category-stack-desktop" aria-label="Product categories">
  <a href="#" class="fade-1">Bars</a>
  <a href="#" class="fade-2">Moons</a>
  <a href="#" class="fade-3">Bananas</a>
  <a href="#" class="fade-3">Bites</a>
  <a href="#" class="fade-4">Elixirs</a>
  <a href="#" class="fade-4">Packs</a>
  <a href="#" class="fade-5">Gifts</a>
</nav>

<main class="hero">
  <img src="assets/bar_hero_front.png" alt="Maple Moon Carob Bar" class="product-img fade-2">
  <img src="assets/carob_wordmark.svg" alt="CAROB" class="carob-wordmark-mobile fade-3">
  <img src="assets/carob_wordmark.svg" alt="CAROB" class="carob-wordmark-desktop fade-4">
</main>

<nav class="category-strip-mobile fade-5" aria-label="Product categories">
  <div class="inner">
    <a href="#">Bars</a><span class="dot"></span>
    <a href="#">Moons</a><span class="dot"></span>
    <a href="#">Bananas</a><span class="dot"></span>
    <a href="#">Bites</a><span class="dot"></span>
    <a href="#">Elixirs</a><span class="dot"></span>
    <a href="#">Packs</a><span class="dot"></span>
    <a href="#">Gifts</a>
  </div>
</nav>

</body>
</html>
