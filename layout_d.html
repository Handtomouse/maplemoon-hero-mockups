<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MapleMoon — Layout D: CAROB Top, Nav Left</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  @font-face { font-family: 'P22 Mackinac Pro'; font-weight: 400; src: local('P22 Mackinac Pro Book'), local('P22MackinacPro-Book'); }
  @font-face { font-family: 'P22 Mackinac Pro'; font-weight: 500; src: local('P22 Mackinac Pro Medium'), local('P22MackinacPro-Medium'); }
  @font-face { font-family: 'P22 Mackinac Pro'; font-weight: 700; src: local('P22 Mackinac Pro Bold'), local('P22MackinacPro-Bold'); }

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', sans-serif;
    background: linear-gradient(180deg, #7B9DBF 0%, #A8BDD4 100%);
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
    color: #E7E4CA;
  }

  .back-link {
    position: fixed;
    bottom: 16px;
    left: 16px;
    font-family: 'Inter', sans-serif;
    font-size: 0.75rem;
    color: #E7E4CA;
    opacity: 0.5;
    text-decoration: none;
    z-index: 100;
    letter-spacing: 0.02em;
    transition: opacity 0.2s;
  }
  .back-link:hover { opacity: 0.8; }

  .hero {
    position: relative;
    width: 100%;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow: hidden;
  }

  /* Mobile hamburger */
  .hamburger {
    position: absolute;
    top: 24px;
    left: 24px;
    z-index: 20;
    display: flex;
    flex-direction: column;
    gap: 5px;
    cursor: pointer;
    padding: 4px;
  }
  .hamburger span {
    display: block;
    width: 22px;
    height: 2px;
    background: #E7E4CA;
    opacity: 0.8;
    border-radius: 1px;
  }

  /* Logo — mobile: top right */
  .logo-block {
    position: absolute;
    top: 24px;
    right: 24px;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 5px;
  }
  .logo-block img {
    width: 36px;
    height: auto;
    filter: brightness(0) invert(0.92) sepia(0.15) saturate(0.4) hue-rotate(10deg);
  }
  .logo-block .brand-name {
    font-family: 'Inter', sans-serif;
    font-weight: 300;
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    text-transform: lowercase;
    color: #E7E4CA;
    opacity: 0.85;
  }

  /* CAROB headline — mobile */
  .carob-headline {
    margin-top: 80px;
    width: 85vw;
    z-index: 5;
    display: block;
  }

  /* Product image */
  .product-image {
    position: relative;
    z-index: 5;
    width: 55%;
    max-width: 260px;
    margin-top: 24px;
    flex-shrink: 0;
  }
  .product-image img {
    width: 100%;
    height: auto;
    filter: drop-shadow(0 20px 40px rgba(0,0,0,0.18));
  }

  /* Categories — mobile: horizontal scroll at bottom */
  .categories {
    position: absolute;
    bottom: 32px;
    left: 0;
    width: 100%;
    z-index: 10;
    display: flex;
    gap: 20px;
    padding: 0 24px;
    overflow-x: auto;
    scrollbar-width: none;
    -ms-overflow-style: none;
    white-space: nowrap;
  }
  .categories::-webkit-scrollbar { display: none; }
  .categories a {
    font-family: 'P22 Mackinac Pro', 'Georgia', serif;
    font-weight: 500;
    font-size: 0.75rem;
    letter-spacing: 0.1em;
    color: #E7E4CA;
    text-decoration: none;
    text-transform: uppercase;
    opacity: 0.7;
    transition: opacity 0.2s;
    flex-shrink: 0;
  }
  .categories a:hover { opacity: 1; }

  /* Left column wrapper (desktop only) */
  .left-column {
    display: none;
  }

  /* Desktop — 768px+ */
  @media (min-width: 768px) {
    .hamburger { display: none; }

    .hero {
      flex-direction: row;
      align-items: stretch;
      justify-content: flex-start;
    }

    /* Left column: CAROB + categories */
    .left-column {
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      padding: 56px 0 56px 56px;
      z-index: 10;
      flex-shrink: 0;
      width: 40%;
      max-width: 420px;
    }

    .carob-headline {
      margin-top: 0;
      width: 100%;
    }
    /* Hide the mobile carob (shown inside .hero flow) */
    .hero > .carob-headline { display: none; }

    .categories {
      position: static;
      flex-direction: column;
      gap: 0;
      padding: 0;
      overflow-x: visible;
      width: auto;
      margin-top: 32px;
      align-items: flex-start;
    }
    .categories a {
      font-size: 1.1rem;
      line-height: 2.0;
      opacity: 0.65;
    }
    .categories a:hover { opacity: 1; }

    /* Logo — top right on desktop */
    .logo-block {
      top: 48px;
      right: 56px;
      align-items: flex-end;
      gap: 8px;
    }
    .logo-block img { width: 60px; }
    .logo-block .brand-name {
      font-size: 0.8rem;
      letter-spacing: 0.18em;
    }

    /* Product image — center-right */
    .product-image {
      position: absolute;
      right: 12%;
      top: 50%;
      transform: translateY(-50%);
      width: 300px;
      max-width: 300px;
      margin-top: 0;
    }
    .product-image img {
      filter: drop-shadow(0 30px 60px rgba(0,0,0,0.2));
    }

    .back-link {
      bottom: 24px;
      left: 56px;
      font-size: 0.8rem;
    }
  }

  @media (min-width: 1024px) {
    .left-column {
      padding-left: 72px;
    }
    .carob-headline {
      width: 100%;
    }
    .product-image {
      right: 15%;
      width: 320px;
      max-width: 320px;
    }
  }
</style>
</head>
<body>

<a href="index.html" class="back-link">&larr; Back to Gallery</a>

<section class="hero">
  <!-- Mobile hamburger -->
  <div class="hamburger">
    <span></span>
    <span></span>
    <span></span>
  </div>

  <!-- Logo -->
  <div class="logo-block">
    <img src="assets/maplemoon_logo.svg" alt="MapleMoon">
    <span class="brand-name">maple moon</span>
  </div>

  <!-- CAROB headline (mobile flow position) -->
  <img class="carob-headline" src="assets/carob_wordmark.svg" alt="CAROB">

  <!-- Left column for desktop: CAROB + categories -->
  <div class="left-column">
    <img class="carob-headline" src="assets/carob_wordmark.svg" alt="CAROB">
    <nav class="categories">
      <a href="#">Bars</a>
      <a href="#">Moons</a>
      <a href="#">Bananas</a>
      <a href="#">Bites</a>
      <a href="#">Elixirs</a>
      <a href="#">Packs</a>
      <a href="#">Gifts</a>
    </nav>
  </div>

  <!-- Product image -->
  <div class="product-image">
    <img src="assets/bar_hero_front.png" alt="MapleMoon Carob Bar">
  </div>

  <!-- Categories (mobile only — duplicated, hidden on desktop) -->
  <nav class="categories mobile-categories">
    <a href="#">Bars</a>
    <a href="#">Moons</a>
    <a href="#">Bananas</a>
    <a href="#">Bites</a>
    <a href="#">Elixirs</a>
    <a href="#">Packs</a>
    <a href="#">Gifts</a>
  </nav>
</section>

<style>
  /* Hide mobile-only categories on desktop */
  @media (min-width: 768px) {
    .mobile-categories { display: none !important; }
  }
</style>

</body>
</html>
