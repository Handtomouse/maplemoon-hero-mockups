<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MapleMoon — Mockup 16 — Scroll-Reveal Product Expand</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  @font-face {
    font-family: 'P22 Mackinac Pro';
    src: local('P22 Mackinac Pro Book'), local('P22MackinacPro-Book');
    font-weight: 400;
    font-style: normal;
  }
  @font-face {
    font-family: 'P22 Mackinac Pro';
    src: local('P22 Mackinac Pro Medium'), local('P22MackinacPro-Medium');
    font-weight: 500;
    font-style: normal;
  }
  @font-face {
    font-family: 'P22 Mackinac Pro';
    src: local('P22 Mackinac Pro Bold'), local('P22MackinacPro-Bold');
    font-weight: 700;
    font-style: normal;
  }

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --navy: #1E4366;
    --cream: #E7E4CA;
    --cream-light: #F5F3E8;
    --lilac: #D8CFF2;
    --heading: 'P22 Mackinac Pro', Georgia, serif;
    --body: 'Inter', sans-serif;
  }

  html {
    scroll-behavior: auto; /* We handle smooth manually */
  }

  body {
    font-family: var(--body);
    color: var(--cream);
    background: var(--navy);
    overflow-x: hidden;
    height: 200vh;
  }

  /* Nav */
  nav {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 24px 48px;
    z-index: 100;
    transition: background 0.4s ease;
  }
  nav.scrolled {
    background: rgba(30,67,102,0.95);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
  }

  .nav-logo img {
    height: 36px;
    opacity: 0.9;
  }

  .nav-links {
    display: flex;
    gap: 36px;
    list-style: none;
  }

  .nav-links a {
    color: var(--cream);
    text-decoration: none;
    font-family: var(--body);
    font-size: 14px;
    font-weight: 400;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    opacity: 0.7;
    transition: opacity 0.3s ease;
  }
  .nav-links a:hover { opacity: 1; }

  /* Hero viewport lock */
  .hero {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: var(--navy);
    z-index: 1;
  }

  /* Atmospheric background */
  .hero::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 50% 50% at 50% 50%, rgba(216,207,242,0.04) 0%, transparent 70%),
      radial-gradient(ellipse 80% 40% at 30% 70%, rgba(30,67,102,0.3) 0%, transparent 50%);
    pointer-events: none;
  }

  /* Moon circle container */
  .moon-container {
    position: relative;
    z-index: 5;
    width: 80px;
    height: 80px;
    border-radius: 50%;
    overflow: hidden;
    border: 1.5px solid rgba(231,228,202,0.15);
    box-shadow: 0 0 40px rgba(216,207,242,0.08), 0 0 80px rgba(30,67,102,0.2);
    transition: box-shadow 0.3s ease;
    will-change: transform;
  }

  .moon-container img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  /* Brand name below circle */
  .brand-name {
    font-family: var(--heading);
    font-size: 18px;
    font-weight: 400;
    color: var(--cream);
    opacity: 0.4;
    margin-top: 20px;
    letter-spacing: 0.15em;
    z-index: 5;
    transition: opacity 0.3s ease;
  }

  /* Scroll indicator */
  .scroll-indicator {
    position: absolute;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 5;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    opacity: 1;
    transition: opacity 0.4s ease;
  }

  .scroll-indicator.hidden { opacity: 0; pointer-events: none; }

  .scroll-arrow {
    font-size: 20px;
    color: var(--cream);
    opacity: 0.5;
    animation: bounceArrow 2s ease-in-out infinite;
  }

  .scroll-text {
    font-family: var(--body);
    font-size: 12px;
    font-weight: 300;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--cream);
    opacity: 0.4;
  }

  @keyframes bounceArrow {
    0%, 100% { transform: translateY(0); }
    50%      { transform: translateY(6px); }
  }

  /* Revealed content (fades in on scroll) */
  .reveal-content {
    position: absolute;
    top: calc(50% + 120px);
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
    z-index: 5;
    opacity: 0;
    transition: none; /* JS controls this */
    pointer-events: none;
    width: 90vw;
    max-width: 600px;
  }

  .reveal-content.active { pointer-events: auto; }

  .reveal-headline {
    font-family: var(--heading);
    font-size: clamp(36px, 5vw, 56px);
    font-weight: 500;
    color: var(--cream);
    line-height: 1.15;
    margin-bottom: 16px;
    letter-spacing: -0.01em;
  }

  .reveal-tagline {
    font-family: var(--body);
    font-size: clamp(15px, 1.5vw, 19px);
    font-weight: 300;
    color: var(--cream);
    opacity: 0.7;
    margin-bottom: 36px;
    letter-spacing: 0.04em;
  }

  .reveal-cta {
    display: inline-block;
    padding: 16px 44px;
    border: 1.5px solid var(--cream);
    color: var(--cream);
    font-family: var(--body);
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    text-decoration: none;
    background: transparent;
    transition: all 0.4s ease;
    cursor: pointer;
    border-radius: 40px;
  }
  .reveal-cta:hover {
    background: var(--cream);
    color: var(--navy);
  }

  /* Responsive */
  @media (max-width: 768px) {
    nav { padding: 20px 24px; }
    .nav-links { gap: 20px; }
    .nav-links a { font-size: 12px; }
    .reveal-content { top: calc(50% + 100px); }
  }
</style>
</head>
<body>

<nav id="mainNav">
  <div class="nav-logo">
    <img src="assets/maplemoon_logo.svg" alt="MapleMoon">
  </div>
  <ul class="nav-links">
    <li><a href="#">Shop</a></li>
    <li><a href="#">Story</a></li>
    <li><a href="#">Stockists</a></li>
    <li><a href="#">Cart</a></li>
  </ul>
</nav>

<section class="hero" id="hero">
  <div class="moon-container" id="moonContainer">
    <img src="assets/moon_halfopen.png" alt="MapleMoon">
  </div>

  <p class="brand-name" id="brandName">MapleMoon</p>

  <div class="scroll-indicator" id="scrollIndicator">
    <span class="scroll-arrow">&darr;</span>
    <span class="scroll-text">Scroll to discover</span>
  </div>

  <div class="reveal-content" id="revealContent">
    <h1 class="reveal-headline">Artisan Carob</h1>
    <p class="reveal-tagline">Not chocolate. Handcrafted in Australia from organic carob.</p>
    <a href="#" class="reveal-cta">Shop the Range</a>
  </div>
</section>

<script>
(function() {
  const moonContainer = document.getElementById('moonContainer');
  const brandName = document.getElementById('brandName');
  const scrollIndicator = document.getElementById('scrollIndicator');
  const revealContent = document.getElementById('revealContent');
  const mainNav = document.getElementById('mainNav');

  // Scroll range: 0-500px maps to animation progress 0-1
  const SCROLL_RANGE = 500;
  const MIN_SCALE = 1;
  const MAX_SCALE = 5;

  let ticking = false;

  function lerp(a, b, t) {
    return a + (b - a) * t;
  }

  function clamp(val, min, max) {
    return Math.min(Math.max(val, min), max);
  }

  function easeOutCubic(t) {
    return 1 - Math.pow(1 - t, 3);
  }

  function update() {
    const scrollY = window.scrollY || window.pageYOffset;
    const progress = clamp(scrollY / SCROLL_RANGE, 0, 1);
    const easedProgress = easeOutCubic(progress);

    // Scale moon container
    const scale = lerp(MIN_SCALE, MAX_SCALE, easedProgress);
    moonContainer.style.transform = 'scale(' + scale + ')';

    // Expand the border glow as it scales
    const glowSize = lerp(40, 80, easedProgress);
    const glowOpacity = lerp(0.08, 0.15, easedProgress);
    moonContainer.style.boxShadow =
      '0 0 ' + glowSize + 'px rgba(216,207,242,' + glowOpacity + '), ' +
      '0 0 ' + (glowSize * 2) + 'px rgba(30,67,102,0.2)';

    // Border fades out as it grows
    const borderOpacity = lerp(0.15, 0.05, easedProgress);
    moonContainer.style.borderColor = 'rgba(231,228,202,' + borderOpacity + ')';

    // Brand name fades and shifts down
    const nameOpacity = lerp(0.4, 0, clamp(progress * 3, 0, 1));
    brandName.style.opacity = nameOpacity;

    // Scroll indicator fades
    const indicatorOpacity = lerp(1, 0, clamp(progress * 4, 0, 1));
    scrollIndicator.style.opacity = indicatorOpacity;
    if (progress > 0.25) {
      scrollIndicator.classList.add('hidden');
    } else {
      scrollIndicator.classList.remove('hidden');
    }

    // Reveal content fades in (delayed start at 40% scroll progress)
    const revealProgress = clamp((progress - 0.4) / 0.6, 0, 1);
    const revealEased = easeOutCubic(revealProgress);
    revealContent.style.opacity = revealEased;
    revealContent.style.transform = 'translateX(-50%) translateY(' + lerp(20, 0, revealEased) + 'px)';
    if (revealProgress > 0) {
      revealContent.classList.add('active');
    } else {
      revealContent.classList.remove('active');
    }

    // Nav background after some scroll
    if (scrollY > 60) {
      mainNav.classList.add('scrolled');
    } else {
      mainNav.classList.remove('scrolled');
    }

    ticking = false;
  }

  function onScroll() {
    if (!ticking) {
      requestAnimationFrame(update);
      ticking = true;
    }
  }

  window.addEventListener('scroll', onScroll, { passive: true });

  // Initial state
  update();
})();
</script>

</body>
</html>
