<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MapleMoon — Layout C: Logo Left, Categories Right</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  @font-face { font-family: 'P22 Mackinac Pro'; font-weight: 400; src: local('P22 Mackinac Pro Book'), local('P22MackinacPro-Book'); }
  @font-face { font-family: 'P22 Mackinac Pro'; font-weight: 500; src: local('P22 Mackinac Pro Medium'), local('P22MackinacPro-Medium'); }
  @font-face { font-family: 'P22 Mackinac Pro'; font-weight: 700; src: local('P22 Mackinac Pro Bold'), local('P22MackinacPro-Bold'); }

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', sans-serif;
    background: linear-gradient(180deg, #7B9DBF 0%, #A8BDD4 100%);
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
    color: #E7E4CA;
  }

  /* [19] Page load fade-in */
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* [11] Focus-visible accessibility */
  a:focus-visible, button:focus-visible, label:focus-visible {
    outline: 2px solid #E7E4CA;
    outline-offset: 3px;
    border-radius: 2px;
  }

  /* [5] Back link — top-left fixed */
  .back-link {
    position: fixed;
    top: 16px;
    left: 16px;
    font-family: 'Inter', sans-serif;
    font-size: 0.75rem;
    color: #E7E4CA;
    opacity: 0.5;
    text-decoration: none;
    z-index: 101;
    letter-spacing: 0.02em;
    transition: opacity 0.2s;
  }
  .back-link:hover { opacity: 0.8; }

  /* [6] Mobile menu overlay */
  #menu-toggle:checked ~ .mobile-menu {
    opacity: 1;
    pointer-events: auto;
  }
  .mobile-menu {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: #E7E4CA;
    z-index: 100;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease;
  }
  .mobile-menu .menu-categories a {
    display: block;
    font-family: 'P22 Mackinac Pro', 'Georgia', serif;
    font-weight: 500;
    font-size: 1.4rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #1E4366;
    text-decoration: none;
    line-height: 2.2;
    text-align: center;
  }
  .mobile-menu .menu-pages a {
    display: block;
    font-family: 'Inter', sans-serif;
    font-weight: 400;
    font-size: 1rem;
    color: #1E4366;
    text-decoration: none;
    line-height: 2.4;
    text-align: center;
    opacity: 0.7;
  }
  .mobile-menu .menu-pages a:hover { opacity: 1; }
  .mobile-menu .menu-categories a:hover { opacity: 0.7; }
  .close-menu {
    position: absolute;
    top: 20px;
    right: 24px;
    font-size: 1.8rem;
    color: #1E4366;
    cursor: pointer;
    line-height: 1;
    z-index: 101;
  }

  /* [6] Hamburger as label */
  .hamburger {
    position: absolute;
    top: 24px;
    right: 24px;
    z-index: 20;
    display: flex;
    flex-direction: column;
    gap: 5px;
    cursor: pointer;
    padding: 4px;
  }
  .hamburger span {
    display: block;
    width: 22px;
    height: 2px;
    background: #E7E4CA;
    opacity: 0.8;
    border-radius: 1px;
  }

  .hero {
    position: relative;
    width: 100%;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* [2] CAROB watermark — opacity 0.12 */
  @keyframes fadeInCarob {
    from { opacity: 0; transform: translate(-50%, calc(-50% + 10px)); }
    to { opacity: 0.12; transform: translate(-50%, -50%); }
  }
  .carob-watermark {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 80vw;
    pointer-events: none;
    z-index: 1;
    display: block;
    /* [19] Stagger: 0.3s */
    opacity: 0;
    animation: fadeInCarob 0.6s ease forwards 0.3s;
  }

  /* Logo block — top left */
  .logo-block {
    position: absolute;
    top: 28px;
    left: 24px;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 6px;
    /* [19] Stagger: 0s */
    opacity: 0;
    animation: fadeIn 0.6s ease forwards 0s;
  }
  /* [4] Logo: 40px mobile */
  .logo-block img {
    width: 40px;
    height: auto;
    filter: brightness(0) invert(0.92) sepia(0.15) saturate(0.4) hue-rotate(10deg);
  }
  .logo-block .brand-name {
    font-family: 'Inter', sans-serif;
    font-weight: 300;
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    text-transform: lowercase;
    color: #E7E4CA;
    opacity: 0.85;
  }

  /* [3] Product image — mobile drop-shadow */
  .product-image {
    position: relative;
    z-index: 5;
    width: 60%;
    max-width: 280px;
    /* [19] Stagger: 0.2s */
    opacity: 0;
    animation: fadeIn 0.6s ease forwards 0.2s;
  }
  .product-image img {
    width: 100%;
    height: auto;
    filter: drop-shadow(0 16px 32px rgba(0,0,0,0.15));
    /* [18] Product hover */
    transition: transform 0.4s ease, filter 0.4s ease;
  }
  .product-image img:hover {
    transform: scale(1.03);
  }

  /* [13] Right-edge fade on mobile category strip */
  .categories {
    position: absolute;
    bottom: 32px;
    left: 0;
    width: 100%;
    z-index: 10;
    display: flex;
    gap: 8px;
    padding: 0 24px;
    overflow-x: auto;
    scrollbar-width: none;
    -ms-overflow-style: none;
    white-space: nowrap;
    /* [20] Scroll snap */
    scroll-snap-type: x mandatory;
    /* [19] Stagger: 0.4s */
    opacity: 0;
    animation: fadeIn 0.6s ease forwards 0.4s;
  }
  .categories::after {
    content: '';
    position: absolute;
    right: 0;
    top: 0;
    bottom: 0;
    width: 40px;
    background: linear-gradient(to right, transparent, #A8BDD4);
    pointer-events: none;
  }
  .categories::-webkit-scrollbar { display: none; }
  /* [1] uppercase, [7] <a> tags, [8] hover underline, [9] dot separators, [14] min-height 44px */
  .categories a {
    font-family: 'P22 Mackinac Pro', 'Georgia', serif;
    font-weight: 500;
    font-size: 0.75rem;
    letter-spacing: 0.1em;
    color: #E7E4CA;
    text-decoration: none;
    text-transform: uppercase;
    opacity: 0.7;
    transition: opacity 0.2s, border-color 0.2s ease;
    flex-shrink: 0;
    border-bottom: 1.5px solid transparent;
    /* [14] Touch target */
    min-height: 44px;
    display: inline-flex;
    align-items: center;
    padding: 8px 12px;
    /* [20] Scroll snap */
    scroll-snap-align: start;
  }
  .categories a:hover { opacity: 1; border-color: #E7E4CA; }
  /* [9] Dot separators */
  .categories .dot-sep {
    flex-shrink: 0;
    font-size: 0.6rem;
    opacity: 0.4;
    display: inline-flex;
    align-items: center;
    pointer-events: none;
    user-select: none;
  }

  /* Desktop — 768px+ */
  @media (min-width: 768px) {
    .hamburger { display: none; }
    .mobile-menu { display: none; }

    .logo-block {
      top: 48px;
      left: 48px;
      gap: 8px;
    }
    /* [4] Logo: 56px desktop */
    .logo-block img {
      width: 56px;
    }
    .logo-block .brand-name {
      font-size: 0.85rem;
      letter-spacing: 0.18em;
    }

    .carob-watermark {
      width: 80vw;
    }

    .product-image {
      width: 300px;
      max-width: 300px;
    }
    /* [3] Desktop drop-shadow */
    .product-image img {
      filter: drop-shadow(0 24px 48px rgba(0,0,0,0.18));
    }

    /* Categories stacked vertically on right */
    .categories {
      position: absolute;
      bottom: auto;
      left: auto;
      right: 56px;
      top: 50%;
      transform: translateY(-50%);
      width: auto;
      flex-direction: column;
      gap: 0;
      padding: 0;
      overflow-x: visible;
      align-items: flex-end;
      scroll-snap-type: unset;
    }
    .categories::after { display: none; }
    .categories a {
      font-size: 1.2rem;
      line-height: 2.2;
      opacity: 0.65;
      min-height: auto;
      padding: 0;
    }
    .categories a:hover {
      opacity: 1;
      border-color: #E7E4CA;
    }
    /* [9] Hide dot separators on desktop vertical layout */
    .categories .dot-sep { display: none; }

    .back-link {
      top: 16px;
      left: 16px;
      font-size: 0.8rem;
    }
  }

  @media (min-width: 1024px) {
    .categories {
      right: 80px;
    }
    .logo-block {
      left: 64px;
      top: 56px;
    }
  }
</style>
</head>
<body>

<!-- [6] Checkbox toggle for mobile menu -->
<input type="checkbox" id="menu-toggle" hidden>

<!-- [6] Mobile menu overlay -->
<div class="mobile-menu">
  <label for="menu-toggle" class="close-menu" aria-label="Close menu">&times;</label>
  <div class="menu-categories">
    <a href="#">BARS</a>
    <a href="#">MOONS</a>
    <a href="#">BANANAS</a>
    <a href="#">BITES</a>
    <a href="#">ELIXIRS</a>
    <a href="#">PACKS</a>
    <a href="#">GIFTS</a>
  </div>
  <div class="menu-pages">
    <a href="#">Our Story</a>
    <a href="#">Shop</a>
    <a href="#">Stockists</a>
    <a href="#">Recipes</a>
    <a href="#">Contact</a>
  </div>
</div>

<a href="index.html" class="back-link">&larr; Back to Gallery</a>

<section class="hero">
  <img class="carob-watermark" src="assets/carob_wordmark.svg" alt="CAROB">

  <!-- [6] Hamburger as label -->
  <label for="menu-toggle" class="hamburger" aria-label="Open menu" aria-expanded="false">
    <span></span>
    <span></span>
    <span></span>
  </label>

  <div class="logo-block">
    <img src="assets/maplemoon_logo.svg" alt="MapleMoon">
    <span class="brand-name">maple moon</span>
  </div>

  <div class="product-image">
    <img src="assets/bar_hero_front.png" alt="MapleMoon Carob Bar">
  </div>

  <!-- [12] aria-label, role -->
  <nav class="categories" role="navigation" aria-label="Product categories">
    <a href="#">BARS</a>
    <span class="dot-sep">&middot;</span>
    <a href="#">MOONS</a>
    <span class="dot-sep">&middot;</span>
    <a href="#">BANANAS</a>
    <span class="dot-sep">&middot;</span>
    <a href="#">BITES</a>
    <span class="dot-sep">&middot;</span>
    <a href="#">ELIXIRS</a>
    <span class="dot-sep">&middot;</span>
    <a href="#">PACKS</a>
    <span class="dot-sep">&middot;</span>
    <a href="#">GIFTS</a>
  </nav>
</section>

</body>
</html>
