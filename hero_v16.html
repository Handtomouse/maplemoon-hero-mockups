<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
  }

  html, body { height: 100%; overflow: hidden; }

  body {
    background: var(--mm-dark-bg);
    font-family: var(--mm-sans);
    color: var(--mm-cream);
    position: relative;
    min-height: 100vh;
    min-height: 100dvh;
    text-rendering: optimizeLegibility;
    overflow: hidden;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .fade-1 { animation: fadeIn 0.8s ease both 0.2s; }
  .fade-2 { animation: fadeIn 0.8s ease both 0.4s; }
  .fade-3 { animation: fadeIn 0.8s ease both 0.6s; }
  .fade-4 { animation: fadeIn 0.8s ease both 0.8s; }

  /* ── Back link ── */
  .back-link {
    position: fixed; top: 16px; left: 16px; z-index: 10;
    color: var(--mm-cream); text-decoration: none;
    font-family: var(--mm-sans); font-size: 0.8rem; font-weight: 400;
    opacity: 0.7; transition: opacity 0.2s;
  }
  .back-link:hover { opacity: 1; }

  /* ── Mobile header ── */
  .header-mobile {
    position: fixed; top: 0; left: 0; right: 0; z-index: 10;
    display: flex; justify-content: space-between; align-items: flex-start;
    padding: 20px;
  }
  .header-mobile .logo-img { width: 40px; height: auto; }

  /* ── Hamburger ── */
  #menu-toggle { display: none; }

  .hamburger {
    position: fixed; top: 12px; left: 12px; z-index: 200;
    cursor: pointer; display: flex; flex-direction: column;
    justify-content: center; gap: 5px; width: 44px; height: 44px;
    padding: 8px;
  }
  .hamburger span {
    display: block; width: 100%; height: 2px;
    background: var(--mm-cream); border-radius: 1px;
    transition: transform 0.3s, opacity 0.3s;
  }
  #menu-toggle:checked ~ .hamburger span:nth-child(1) { transform: rotate(45deg) translate(5px, 5px); }
  #menu-toggle:checked ~ .hamburger span:nth-child(2) { opacity: 0; }
  #menu-toggle:checked ~ .hamburger span:nth-child(3) { transform: rotate(-45deg) translate(5px, -5px); }

  /* ── Mobile menu overlay ── */
  .mobile-menu {
    position: fixed; inset: 0; z-index: 150;
    background: var(--mm-cream); color: var(--mm-navy);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 28px;
    opacity: 0; pointer-events: none;
    transition: opacity 0.3s ease;
  }
  #menu-toggle:checked ~ .mobile-menu { opacity: 1; pointer-events: auto; }

  .mobile-menu a {
    font-family: var(--mm-serif); font-size: 1.4rem;
    font-weight: 500; text-transform: uppercase; letter-spacing: 0.12em;
    color: var(--mm-navy); text-decoration: none;
    transition: opacity 0.2s;
    min-height: 44px; padding: 12px 0;
    display: inline-flex; align-items: center;
  }
  .mobile-menu a:hover { opacity: 0.6; }

  .mobile-menu .menu-divider {
    width: 40px; height: 1px; background: var(--mm-navy); opacity: 0.2;
  }

  .mobile-menu .menu-nav {
    display: flex; flex-direction: column; align-items: center; gap: 20px;
    margin-top: 24px; padding-top: 24px;
    border-top: 1px solid var(--mm-navy-15);
  }
  .mobile-menu .menu-nav a {
    font-family: var(--mm-sans); font-size: 0.95rem;
    font-weight: 400; text-transform: none; letter-spacing: 0.04em;
    color: var(--mm-navy); opacity: 0.6;
  }

  /* ── Desktop nav ── */
  .header-desktop { display: none; }

  /* ── Masonry drift ── */
  .masonry-viewport {
    position: fixed;
    inset: 0;
    overflow: hidden;
    z-index: 0;
  }

  .masonry-track {
    display: flex;
    gap: 6px;
    padding: 0 6px;
    width: 100%;
    height: 100%;
  }

  @keyframes drift-up {
    from { transform: translateY(0); }
    to   { transform: translateY(-50%); }
  }

  .drift-col {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  @media (prefers-reduced-motion: no-preference) {
    .drift-col { animation: drift-up linear infinite; }
    .drift-col:nth-child(1) { animation-duration: 80s; }
    .drift-col:nth-child(2) { animation-duration: 90s; }
    .drift-col:nth-child(3) { animation-duration: 100s; }
  }

  .masonry-track.paused .drift-col {
    animation-play-state: paused;
  }

  .drift-col img {
    width: 100%;
    display: block;
    border-radius: var(--radius-sm);
    opacity: 0.6;
    transition: opacity 0.4s;
  }

  .masonry-track.paused .drift-col img {
    opacity: 0.3;
  }

  /* ── Vignette overlay ── */
  .vignette {
    position: fixed;
    inset: 0;
    z-index: 1;
    pointer-events: none;
    background: radial-gradient(ellipse at center, transparent 30%, rgba(0,0,0,0.7) 100%);
  }

  /* ── Hero overlay content ── */
  .hero-overlay-content {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    z-index: 5;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 24px;
    pointer-events: none;
  }

  .hero-overlay-content > * {
    pointer-events: auto;
  }

  .hero-wordmark {
    width: 140px;
    height: auto;
    margin-bottom: 12px;
    filter: brightness(10);
    opacity: 0.9;
  }

  .hero-title {
    font-family: var(--mm-serif);
    font-weight: 400;
    font-size: 1.8rem;
    letter-spacing: 0.06em;
    line-height: 1.15;
    margin-bottom: 8px;
    text-shadow: 0 2px 20px rgba(0,0,0,0.5);
  }

  .hero-tagline {
    font-family: var(--mm-sans);
    font-weight: 300;
    font-size: 0.9rem;
    opacity: 0.85;
    margin-bottom: 28px;
    text-shadow: 0 1px 10px rgba(0,0,0,0.5);
  }

  .cta-btn {
    display: inline-flex; align-items: center; justify-content: center;
    border: 1.5px solid var(--mm-cream); color: var(--mm-cream);
    background: rgba(0,0,0,0.3); border-radius: var(--radius-pill);
    padding: 12px 32px; min-height: 48px;
    font-family: var(--mm-sans); font-size: 0.85rem;
    font-weight: 400; letter-spacing: 0.06em; text-transform: uppercase;
    text-decoration: none; cursor: pointer;
    transition: background 0.3s, color 0.3s, transform 0.15s;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
  }
  .cta-btn:hover {
    background: var(--mm-cream); color: var(--mm-navy);
  }
  .cta-btn:active {
    transform: scale(0.97);
  }

  /* ── Trust row ── */
  .trust-row {
    display: flex; align-items: center; justify-content: center; gap: 14px;
    margin-top: 20px;
  }
  .trust-row img {
    width: 20px; height: 20px;
    filter: brightness(0) invert(0.92) sepia(0.1) saturate(0.3);
    opacity: 0.5;
  }

  /* ── Reduced motion fallback ── */
  @media (prefers-reduced-motion: reduce) {
    html, body { height: auto; overflow-y: auto; }
    .masonry-viewport {
      position: relative;
      overflow-y: auto;
    }
    .drift-col { animation: none; }
    .drift-col img { opacity: 0.5; }
  }

  /* ── DESKTOP ── */
  @media (min-width: 768px) {
    .hamburger { display: none; }
    .header-mobile { display: none; }

    .header-desktop {
      display: flex; align-items: center;
      position: fixed; top: 0; left: 0; right: 0; z-index: 10;
      padding: 28px 40px;
      background: transparent;
    }
    .header-desktop nav {
      flex: 1; display: flex; align-items: center;
      justify-content: center; gap: 40px;
    }
    .header-desktop nav a {
      font-family: var(--mm-sans); font-size: 1rem;
      font-weight: 400; color: var(--mm-cream); text-decoration: none;
      opacity: 0.9; transition: opacity 0.2s;
    }
    .header-desktop nav a:hover { opacity: 0.6; }
    .header-desktop .logo-desktop {
      width: 80px; height: auto; margin-left: auto; flex-shrink: 0;
    }

    .masonry-track {
      gap: 8px;
      padding: 0 8px;
    }

    .drift-col {
      gap: 8px;
    }

    .drift-col img {
      border-radius: var(--radius-md);
    }

    .hero-overlay-content {
      align-items: flex-start;
      justify-content: flex-end;
      text-align: left;
      padding: 0 60px 80px;
    }

    .hero-wordmark {
      width: 180px;
      margin-bottom: 16px;
    }

    .hero-title {
      font-size: 3rem;
      margin-bottom: 12px;
    }

    .hero-tagline {
      font-size: 1.05rem;
      margin-bottom: 32px;
    }

    .cta-btn {
      padding: 14px 40px;
      font-size: 0.95rem;
    }

    .trust-row {
      justify-content: flex-start;
    }
  }

  @media (min-width: 1024px) {
    .header-desktop { padding: 32px 48px; }
    .header-desktop nav { gap: 52px; }

    .hero-overlay-content {
      padding: 0 80px 100px;
    }

    .hero-title {
      font-size: 3.4rem;
    }
  }
</style>

<script>
(function() {
  if (!('IntersectionObserver' in window)) {
    document.querySelectorAll('[class*="fade"]').forEach(function(el) { el.style.opacity = '1'; });
  }

  // Pause/resume drift on interaction
  var track = document.getElementById('masonry-track');
  var viewport = document.querySelector('.masonry-viewport');

  viewport.addEventListener('mouseenter', function() {
    track.classList.add('paused');
  });
  viewport.addEventListener('mouseleave', function() {
    track.classList.remove('paused');
  });
  viewport.addEventListener('touchstart', function() {
    track.classList.add('paused');
  }, { passive: true });
  viewport.addEventListener('touchend', function() {
    track.classList.remove('paused');
  }, { passive: true });

  // Mobile menu
  var toggle = document.getElementById('menu-toggle');
  var menu = document.querySelector('.mobile-menu');
  var hamburger = document.querySelector('.hamburger');

  document.querySelectorAll('.mobile-menu a').forEach(function(link) {
    link.addEventListener('click', function() { toggle.checked = false; toggle.dispatchEvent(new Event('change')); });
  });

  toggle.addEventListener('change', function() {
    var isOpen = toggle.checked;
    menu.setAttribute('aria-hidden', isOpen ? 'false' : 'true');
    hamburger.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
    if (!isOpen) { hamburger.focus(); return; }
    var focusable = menu.querySelectorAll('a, button, [tabindex]');
    if (!focusable.length) return;
    var first = focusable[0], last = focusable[focusable.length - 1];
    function trap(e) {
      if (e.key === 'Escape') { toggle.checked = false; toggle.dispatchEvent(new Event('change')); return; }
      if (e.key !== 'Tab') return;
      if (e.shiftKey) { if (document.activeElement === first) { e.preventDefault(); last.focus(); } }
      else { if (document.activeElement === last) { e.preventDefault(); first.focus(); } }
    }
    menu.addEventListener('keydown', trap);
    first.focus();
    var obs = new MutationObserver(function() {
      if (!toggle.checked) { menu.removeEventListener('keydown', trap); obs.disconnect(); }
    });
    obs.observe(toggle, { attributes: true });
  });
})();
</script>
