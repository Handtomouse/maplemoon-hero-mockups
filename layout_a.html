<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MapleMoon — Layout A: Category Stack + Wordmark</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  @font-face { font-family: 'P22 Mackinac Pro'; font-weight: 400; src: local('P22 Mackinac Pro Book'), local('P22MackinacPro-Book'); }
  @font-face { font-family: 'P22 Mackinac Pro'; font-weight: 500; src: local('P22 Mackinac Pro Medium'), local('P22MackinacPro-Medium'); }
  @font-face { font-family: 'P22 Mackinac Pro'; font-weight: 700; src: local('P22 Mackinac Pro Bold'), local('P22MackinacPro-Bold'); }

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    margin: 0;
    font-family: 'Inter', sans-serif;
  }

  .back-link {
    position: fixed;
    top: 16px;
    left: 16px;
    color: #E7E4CA;
    opacity: 0.5;
    font-family: 'Inter', sans-serif;
    font-size: 0.75rem;
    text-decoration: none;
    z-index: 100;
    letter-spacing: 0.02em;
  }
  .back-link:hover { opacity: 0.8; }

  .hero {
    width: 100%;
    height: 100vh;
    background: linear-gradient(180deg, #7B9DBF 0%, #A8BDD4 100%);
    position: relative;
    overflow: hidden;
  }

  /* Top bar */
  .top-bar {
    position: absolute;
    top: 0; left: 0; right: 0;
    padding: 48px 24px 0;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    z-index: 10;
  }

  .hamburger {
    display: flex;
    flex-direction: column;
    gap: 5px;
    cursor: pointer;
    padding: 4px 0;
  }
  .hamburger span {
    display: block;
    width: 24px;
    height: 2px;
    background: #E7E4CA;
    border-radius: 1px;
  }

  .logo-group {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }
  .logo-group img {
    width: 40px;
    height: auto;
  }
  .logo-group .logo-text {
    font-family: 'Inter', sans-serif;
    font-weight: 300;
    font-size: 0.65rem;
    color: #E7E4CA;
    letter-spacing: 0.15em;
    text-transform: lowercase;
  }

  /* Category nav — hidden on mobile, stacked on desktop */
  .category-nav {
    display: none;
  }

  /* CAROB giant text — mobile */
  .carob-giant {
    position: absolute;
    bottom: 10vh;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'P22 Mackinac Pro', 'Georgia', serif;
    font-weight: 700;
    font-size: 18vw;
    color: #E7E4CA;
    letter-spacing: 0.06em;
    white-space: nowrap;
    z-index: 2;
    line-height: 1;
  }

  /* CAROB watermark behind — mobile */
  .carob-watermark {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-family: 'P22 Mackinac Pro', 'Georgia', serif;
    font-weight: 700;
    font-size: 30vw;
    color: #E7E4CA;
    opacity: 0.09;
    letter-spacing: 0.05em;
    white-space: nowrap;
    pointer-events: none;
    z-index: 1;
  }

  /* Desktop layout */
  @media (min-width: 768px) {
    .hamburger { display: none; }

    .top-bar {
      padding: 48px 48px 0;
    }

    .category-nav {
      display: flex;
      flex-direction: column;
      position: absolute;
      top: 48px;
      left: 48px;
      z-index: 10;
    }
    .category-nav a {
      font-family: 'P22 Mackinac Pro', 'Georgia', serif;
      font-weight: 500;
      font-size: 1.3rem;
      color: #E7E4CA;
      text-decoration: none;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      line-height: 2.2;
      opacity: 0.8;
      transition: opacity 0.2s;
    }
    .category-nav a:hover { opacity: 1; }

    .logo-group {
      position: absolute;
      top: 48px;
      right: 48px;
    }
    .logo-group img {
      width: 48px;
    }

    /* Giant CAROB anchored to bottom, bleeding off */
    .carob-giant {
      bottom: -5vh;
      font-size: 22vw;
      opacity: 1;
    }

    .carob-watermark {
      display: none;
    }
  }
</style>
</head>
<body>

<a href="index.html" class="back-link">&larr; Back to Gallery</a>

<div class="hero">
  <!-- Top bar (mobile) -->
  <div class="top-bar">
    <div class="hamburger">
      <span></span>
      <span></span>
      <span></span>
    </div>
    <div class="logo-group">
      <img src="assets/maplemoon_logo.svg" alt="MapleMoon">
      <span class="logo-text">maple moon</span>
    </div>
  </div>

  <!-- Category nav (desktop only) -->
  <nav class="category-nav">
    <a href="#">BARS</a>
    <a href="#">MOONS</a>
    <a href="#">BANANAS</a>
    <a href="#">BITES</a>
    <a href="#">ELIXIRS</a>
    <a href="#">PACKS</a>
    <a href="#">GIFTS</a>
  </nav>

  <!-- Watermark (mobile) -->
  <div class="carob-watermark">CAROB</div>

  <!-- Giant CAROB -->
  <div class="carob-giant">CAROB</div>
</div>

</body>
</html>
