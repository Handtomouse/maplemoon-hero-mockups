<!DOCTYPE html>
<html lang="en-AU">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MapleMoon — Hero Concepts | HandToMouse Studio</title>
  <meta name="description" content="12 responsive hero concepts for maplemoon.com.au — organic carob chocolate from Byron Bay.">
  <meta name="theme-color" content="#7B9DBF">
  <meta property="og:title" content="MapleMoon — Hero Concepts">
  <meta property="og:description" content="12 responsive hero concepts for maplemoon.com.au by HandToMouse Studio.">
  <meta property="og:type" content="website">
  <link rel="stylesheet" href="brand_kit.css">
  <style>
    /* ============================================================
       MapleMoon Hero Gallery — Aesop / Le Labo editorial style
       ============================================================ */

    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    @media (prefers-reduced-motion: no-preference) {
      html { scroll-behavior: smooth; }
    }

    body {
      font-family: var(--mm-sans, 'Neue Haas Grotesk Display Pro', 'Helvetica Neue', Helvetica, Arial, sans-serif);
      font-weight: 300;
      background: #FAFAF7;
      color: var(--mm-navy);
      min-height: 100vh;
      line-height: 1.6;
    }

    /* --- Header --- */

    .gallery-header {
      max-width: 1200px;
      margin: 0 auto;
      padding: 56px 48px 0;
      display: flex;
      align-items: flex-start;
      gap: 20px;
      flex-wrap: wrap;
    }

    .gallery-header__logo {
      width: 40px;
      height: auto;
      opacity: 0.7;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .gallery-header__text {
      flex: 1;
      min-width: 240px;
    }

    .gallery-header__title {
      font-family: var(--mm-serif, 'P22 Mackinac Pro', Georgia, serif);
      font-weight: 400;
      font-size: 1.8rem;
      letter-spacing: 0.01em;
      line-height: 1.2;
      color: var(--mm-navy);
    }

    .gallery-header__subtitle {
      font-weight: 300;
      font-size: 0.85rem;
      color: rgba(30, 67, 102, 0.5);
      margin-top: 6px;
      letter-spacing: 0.01em;
    }

    /* --- Divider --- */

    .gallery-divider {
      max-width: 1200px;
      margin: 40px auto 0;
      padding: 0 48px;
    }

    .gallery-divider hr {
      border: none;
      border-top: 1px solid rgba(0, 0, 0, 0.06);
    }

    /* --- Cards Container --- */

    .gallery-cards {
      max-width: 1200px;
      margin: 0 auto;
      padding: 48px 48px 80px;
      display: flex;
      flex-direction: column;
      gap: 72px;
    }

    /* --- Single Hero Card --- */

    .hero-card {
      display: flex;
      flex-direction: column;
      gap: 28px;
    }

    .hero-card__header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 8px 24px;
    }

    .hero-card__title {
      font-family: var(--mm-serif, 'P22 Mackinac Pro', Georgia, serif);
      font-weight: 400;
      font-size: 1.25rem;
      letter-spacing: 0.01em;
      color: var(--mm-navy);
    }

    .hero-card__title span {
      color: rgba(30, 67, 102, 0.35);
    }

    .hero-card__desc {
      font-size: 0.875rem;
      font-weight: 300;
      color: rgba(30, 67, 102, 0.5);
      line-height: 1.5;
      max-width: 560px;
    }

    .hero-card__link {
      font-size: 0.75rem;
      font-weight: 400;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: rgba(30, 67, 102, 0.4);
      text-decoration: none;
      transition: color 0.2s ease;
      white-space: nowrap;
      min-height: 44px;
      padding: 12px 0;
      display: inline-flex;
      align-items: center;
    }

    .hero-card__link:hover {
      color: var(--mm-navy);
    }

    .hero-card__link::after {
      content: ' \2197';
      font-size: 0.85em;
    }

    /* --- Device Previews Row --- */

    .device-row {
      display: flex;
      align-items: flex-start;
      gap: 24px;
    }

    .device-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    .device-label {
      font-size: 0.7rem;
      font-weight: 400;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(30,67,102,0.4);
    }

    /* --- Device Frames --- */

    .device-frame {
      overflow: hidden;
      border-radius: 8px;
      border: 1px solid var(--mm-black-08);
      background: #F0F0EC;
      position: relative;
    }

    .device-frame iframe {
      display: block;
      border: none;
      pointer-events: none;
      transform-origin: 0 0;
    }

    /* iPhone: 390x844 displayed at 180x390 */
    .device-iphone {
      width: 180px;
      height: 390px;
    }

    .device-iphone iframe {
      width: 390px;
      height: 844px;
      transform: scale(0.4615);
    }

    /* iPad: 768x1024 displayed at 260x347 */
    .device-ipad {
      width: 260px;
      height: 347px;
    }

    .device-ipad iframe {
      width: 768px;
      height: 1024px;
      transform: scale(0.3385);
    }

    /* Desktop: 1440x900 displayed at 480x300 */
    .device-desktop {
      width: 480px;
      height: 300px;
    }

    .device-desktop iframe {
      width: 1440px;
      height: 900px;
      transform: scale(0.3333);
    }

    /* --- Placeholder (before iframe loads) --- */

    .device-placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.7rem;
      font-weight: 300;
      color: rgba(30, 67, 102, 0.2);
      letter-spacing: 0.04em;
      pointer-events: none;
      transition: opacity 0.4s ease;
    }

    .device-frame.loaded .device-placeholder {
      opacity: 0;
    }

    /* --- Footer --- */

    .gallery-footer {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 48px 56px;
    }

    .gallery-footer hr {
      border: none;
      border-top: 1px solid rgba(0, 0, 0, 0.06);
      margin-bottom: 24px;
    }

    .gallery-footer__text {
      text-align: center;
      font-size: 0.7rem;
      font-weight: 300;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: rgba(30, 67, 102, 0.25);
    }

    /* --- Scroll to top --- */

    .scroll-top {
      display: inline-block;
      font-size: 0.7rem;
      font-weight: 400;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(30, 67, 102, 0.3);
      text-decoration: none;
      transition: color 0.2s ease;
      padding: 12px 24px;
      min-height: 44px;
    }

    .scroll-top:hover {
      color: var(--mm-navy);
    }

    .scroll-top-wrap {
      text-align: center;
      padding: 24px 0 0;
    }

    /* ============================================================
       Responsive
       ============================================================ */

    /* Tablet: hide iPad, keep iPhone + Desktop */
    @media (max-width: 1199px) {
      .device-col--ipad {
        display: none;
      }

      .device-desktop {
        width: 400px;
        height: 250px;
      }

      .device-desktop iframe {
        transform: scale(0.2778); /* 400/1440 */
      }
    }

    /* Mobile: stack vertically, reduce sizes */
    @media (max-width: 767px) {
      .gallery-header {
        padding: 40px 24px 0;
        gap: 14px;
      }

      .gallery-header__title {
        font-size: 1.4rem;
      }

      .gallery-divider {
        padding: 0 24px;
        margin-top: 28px;
      }

      .gallery-cards {
        padding: 36px 24px 60px;
        gap: 56px;
      }

      .device-row {
        flex-direction: column;
        align-items: stretch;
        gap: 20px;
      }

      .device-col {
        align-items: center;
      }

      .device-col--ipad {
        display: flex;
      }

      /* Smaller iPhone on mobile */
      .device-iphone {
        width: 150px;
        height: 325px;
      }

      .device-iphone iframe {
        transform: scale(0.3846); /* 150/390 */
      }

      /* Smaller iPad on mobile */
      .device-ipad {
        width: 220px;
        height: 293px;
      }

      .device-ipad iframe {
        transform: scale(0.2865); /* 220/768 */
      }

      /* Full-width desktop on mobile */
      .device-desktop {
        width: 100%;
        max-width: 400px;
        height: 250px;
      }

      .device-desktop iframe {
        transform: scale(0.2778);
      }

      .gallery-footer {
        padding: 0 24px 40px;
      }
    }

    /* Very small screens */
    @media (max-width: 480px) {
      .device-desktop {
        height: 190px;
      }

      .device-desktop iframe {
        /* scale to fit ~320px container */
        transform: scale(0.2222);
      }
    }
  </style>
</head>
<body id="top">

<a href="#gallery" class="skip-link">Skip to gallery</a>

  <!-- Header -->
  <header class="gallery-header">
    <img src="assets/maplemoon_logo.svg" alt="MapleMoon" class="gallery-header__logo" width="40" height="40">
    <div class="gallery-header__text">
      <h1 class="gallery-header__title">Hero Concepts</h1>
      <p class="gallery-header__subtitle">12 responsive hero concepts for maplemoon.com.au</p>
    </div>
  </header>

  <div class="gallery-divider"><hr></div>

  <!-- Hero Cards (generated by JS) -->
  <main class="gallery-cards" id="gallery"></main>

  <!-- Scroll to top -->
  <div class="scroll-top-wrap">
    <a href="#top" class="scroll-top">Back to top</a>
  </div>

  <!-- Footer -->
  <footer class="gallery-footer">
    <hr>
    <p class="gallery-footer__text">HandToMouse Studio</p>
  </footer>

  <script>
    const heroes = [
      { id: 'v1',  file: 'hero_v1.html',  title: 'Brand Statement',   desc: 'Giant CAROB wordmark dominates. The brand IS the hero.' },
      { id: 'v2',  file: 'hero_v2.html',  title: 'Shop Now',          desc: 'Product front and center with Shop All CTA. Conversion-focused.' },
      { id: 'v3',  file: 'hero_v3.html',  title: 'What is Carob?',    desc: 'Split layout with story panel. Answers the #1 visitor question.' },
      { id: 'v4',  file: 'hero_v4.html',  title: 'The Range',         desc: 'Three product columns. Shows MapleMoon is a full range.' },
      { id: 'v6',  file: 'hero_v6.html',  title: 'Before & After',    desc: 'Draggable split-screen. Raw carob pods to finished product.' },
      { id: 'v7',  file: 'hero_v7.html',  title: 'Flavour Picker',    desc: 'Click a flavour, everything crossfades. Browsing becomes exploration.' },
      { id: 'v8',  file: 'hero_v8.html',  title: 'Time of Day',       desc: 'Hero adapts to your local time. Every visit feels personal.' },
      { id: 'v9',  file: 'hero_v9.html',  title: 'Story Cards',       desc: 'Swipe through chapters: Pod, Craft, Bar, Shop.' },
      { id: 'v10', file: 'hero_v10.html', title: 'Letterbox Cinema',  desc: 'Cinematic framing with Ken Burns zoom. Criterion Collection vibes.' },
      { id: 'v11', file: 'hero_v11.html', title: 'The Grid',          desc: 'Bento grid showing the full world of MapleMoon at a glance.' },
      { id: 'v12', file: 'hero_v12.html', title: 'The Unwrap',        desc: 'Tap to discover. Product rotates and reveals details.' },
      { id: 'v13', file: 'hero_v13.html', title: 'Full Bleed Photo',  desc: 'Magazine cover layout. Designed for photoshoot hero shots.' },
    ];

    const gallery = document.getElementById('gallery');

    heroes.forEach(hero => {
      const vNum = hero.id.toUpperCase();

      const card = document.createElement('article');
      card.className = 'hero-card';
      card.dataset.heroFile = hero.file;

      card.innerHTML = `
        <div class="hero-card__header">
          <div>
            <h2 class="hero-card__title"><span>${vNum} &mdash;</span> ${hero.title}</h2>
            <p class="hero-card__desc">${hero.desc}</p>
          </div>
          <a href="${hero.file}" target="_blank" class="hero-card__link">Open Full Screen</a>
        </div>
        <div class="device-row">
          <div class="device-col device-col--iphone">
            <div class="device-frame device-iphone" data-src="${hero.file}">
              <div class="device-placeholder">Loading&hellip;</div>
            </div>
            <span class="device-label">iPhone</span>
          </div>
          <div class="device-col device-col--ipad">
            <div class="device-frame device-ipad" data-src="${hero.file}">
              <div class="device-placeholder">Loading&hellip;</div>
            </div>
            <span class="device-label">iPad</span>
          </div>
          <div class="device-col device-col--desktop">
            <div class="device-frame device-desktop" data-src="${hero.file}">
              <div class="device-placeholder">Loading&hellip;</div>
            </div>
            <span class="device-label">Desktop</span>
          </div>
        </div>
      `;

      gallery.appendChild(card);
    });

    /* ---- Lazy-load iframes with IntersectionObserver ---- */

    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          const card = entry.target;
          const frames = card.querySelectorAll('.device-frame[data-src]');

          frames.forEach(frame => {
            if (frame.querySelector('iframe')) return; // already loaded

            const src = frame.dataset.src;
            const iframe = document.createElement('iframe');
            iframe.src = src;
            iframe.setAttribute('loading', 'lazy');
            iframe.setAttribute('tabindex', '-1');
            iframe.setAttribute('aria-hidden', 'true');

            iframe.addEventListener('load', () => {
              frame.classList.add('loaded');
            });

            frame.appendChild(iframe);
          });

          observer.unobserve(card);
        }
      });
    }, {
      rootMargin: '200px 0px', /* start loading 200px before visible */
      threshold: 0
    });

    document.querySelectorAll('.hero-card').forEach(card => {
      observer.observe(card);
    });
  </script>

</body>
</html>
