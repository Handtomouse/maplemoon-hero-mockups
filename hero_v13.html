<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maple Moon — Full Bleed Photo</title>
<link rel="stylesheet" href="brand_kit.css">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --cream: #E7E4CA;
    --navy: #1E4366;
  }

  html, body { height: 100%; overflow: hidden; }

  body {
    font-family: var(--mm-sans);
    color: var(--cream);
    position: relative;
    min-height: 100vh;
    min-height: 100dvh;
    text-rendering: optimizeLegibility;
    overflow-x: hidden;
    background: #111;
  }

  :focus-visible { outline: 2px solid var(--cream); outline-offset: 3px; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes kenBurns {
    0% { transform: scale(1); }
    100% { transform: scale(1.08); }
  }

  .fade-1 { animation: fadeIn 0.8s ease both 0.2s; }
  .fade-2 { animation: fadeIn 0.8s ease both 0.4s; }
  .fade-3 { animation: fadeIn 0.8s ease both 0.6s; }
  .fade-4 { animation: fadeIn 0.8s ease both 0.8s; }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.01ms !important;
    }
  }

  /* ── Full bleed background ── */
  .hero-bg {
    position: fixed; inset: 0; z-index: 0;
    background: url('assets/bar_lifestyle.png') center/cover no-repeat;
    filter: saturate(1.1) contrast(1.05);
  }

  /* ── Dark gradient overlay ── */
  .hero-overlay {
    position: fixed; inset: 0; z-index: 1;
    background: linear-gradient(to bottom, transparent 55%, rgba(0,0,0,0.65));
  }

  /* ── Back link ── */
  .back-link {
    position: fixed; top: 16px; left: 16px; z-index: 10;
    color: var(--cream); text-decoration: none;
    font-family: var(--mm-sans); font-size: 0.8rem; font-weight: 400;
    opacity: 0.7; transition: opacity 0.2s;
  }
  .back-link:hover { opacity: 1; }

  /* ── Mobile header (overlaid, no background) ── */
  .header-mobile {
    position: fixed; top: 0; left: 0; right: 0; z-index: 10;
    display: flex; justify-content: space-between; align-items: flex-start;
    padding: 20px;
  }
  .header-mobile .logo-img { width: 40px; height: auto; }

  /* ── Hamburger ── */
  #menu-toggle { display: none; }

  .hamburger {
    position: fixed; top: 20px; left: 20px; z-index: 200;
    cursor: pointer; display: flex; flex-direction: column;
    justify-content: center; gap: 5px; width: 28px; height: 28px;
  }
  .hamburger span {
    display: block; width: 100%; height: 2px;
    background: var(--cream); border-radius: 1px;
    transition: transform 0.3s, opacity 0.3s;
  }
  #menu-toggle:checked ~ .hamburger span:nth-child(1) { transform: rotate(45deg) translate(5px, 5px); }
  #menu-toggle:checked ~ .hamburger span:nth-child(2) { opacity: 0; }
  #menu-toggle:checked ~ .hamburger span:nth-child(3) { transform: rotate(-45deg) translate(5px, -5px); }

  /* ── Mobile menu overlay ── */
  .mobile-menu {
    position: fixed; inset: 0; z-index: 150;
    background: var(--cream); color: var(--navy);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 28px;
    opacity: 0; pointer-events: none;
    transition: opacity 0.35s ease;
  }
  #menu-toggle:checked ~ .mobile-menu { opacity: 1; pointer-events: auto; }

  .mobile-menu a {
    font-family: var(--mm-serif); font-size: 1.4rem;
    font-weight: 500; text-transform: uppercase; letter-spacing: 0.12em;
    color: var(--navy); text-decoration: none;
    transition: opacity 0.2s;
    min-height: 44px; padding: 12px 0;
    display: inline-flex; align-items: center;
  }
  .mobile-menu a:hover { opacity: 0.6; }

  .mobile-menu .menu-divider {
    width: 40px; height: 1px; background: var(--navy); opacity: 0.2;
  }

  .mobile-menu .menu-nav {
    display: flex; flex-direction: column; align-items: center; gap: 20px;
    margin-top: 24px; padding-top: 24px;
    border-top: 1px solid rgba(30,67,102,0.15);
  }
  .mobile-menu .menu-nav a {
    font-family: var(--mm-sans); font-size: 0.95rem;
    font-weight: 400; text-transform: none; letter-spacing: 0.02em;
    color: var(--navy); opacity: 0.6;
  }

  /* ── Desktop nav ── */
  .header-desktop { display: none; }

  /* ── Hero content (in the dark zone) ── */
  .hero-content {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    padding: 0 24px 100px;
    z-index: 2;
    text-align: center;
  }

  .hero-title {
    font-family: var(--mm-serif);
    font-weight: 400;
    font-size: 1.8rem;
    color: var(--cream);
    letter-spacing: 0.06em;
    margin-bottom: 10px;
  }

  .hero-tagline {
    font-family: var(--mm-sans);
    font-weight: 300;
    font-size: 0.9rem;
    color: var(--cream);
    opacity: 0.8;
    margin-bottom: 24px;
  }

  .cta-btn {
    display: inline-flex; align-items: center; justify-content: center;
    border: 1.5px solid var(--cream); color: var(--cream);
    background: transparent; border-radius: 30px;
    padding: 12px 32px; min-height: 48px;
    font-family: var(--mm-sans); font-size: 0.85rem;
    font-weight: 400; letter-spacing: 0.06em; text-transform: uppercase;
    text-decoration: none; cursor: pointer;
    transition: background 0.3s, color 0.3s, transform 0.15s;
  }
  .cta-btn:hover {
    background: var(--cream); color: var(--navy);
  }
  .cta-btn:active {
    transform: scale(0.97);
  }

  .trust-row {
    display: flex; align-items: center; justify-content: center; gap: 14px;
    margin-top: 20px;
  }
  .trust-row img {
    width: 20px; height: 20px;
    filter: brightness(0) invert(0.92) sepia(0.1) saturate(0.3);
    opacity: 0.5;
  }

  /* ── DESKTOP ── */
  @media (min-width: 768px) {
    .hamburger { display: none; }
    .header-mobile { display: none; }

    .back-link {
      color: var(--cream);
    }

    /* Desktop nav overlaid on photo */
    .header-desktop {
      display: flex; align-items: center;
      position: fixed; top: 0; left: 0; right: 0; z-index: 10;
      padding: 28px 40px;
      background: transparent;
    }
    .header-desktop nav {
      flex: 1; display: flex; align-items: center;
      justify-content: center; gap: 40px;
    }
    .header-desktop nav a {
      font-family: var(--mm-sans); font-size: 1rem;
      font-weight: 400; color: var(--cream); text-decoration: none;
      opacity: 0.9; transition: opacity 0.2s;
    }
    .header-desktop nav a:hover { opacity: 0.6; }
    .header-desktop .logo-desktop {
      width: 80px; height: auto; margin-left: auto; flex-shrink: 0;
    }

    /* Ken Burns zoom on desktop */
    .hero-bg {
      animation: kenBurns 30s ease-in-out infinite alternate;
    }

    /* Text positioned bottom-left — editorial asymmetry */
    .hero-content {
      text-align: left;
      max-width: 500px;
      padding: 0 60px 80px;
    }

    .hero-title {
      font-size: 3rem;
      margin-bottom: 14px;
    }

    .hero-tagline {
      font-size: 1.05rem;
      margin-bottom: 28px;
    }

    .cta-btn {
      padding: 14px 40px;
      font-size: 0.95rem;
    }

    .trust-row {
      justify-content: flex-start;
      margin-top: 24px;
    }
  }

  @media (min-width: 1024px) {
    .header-desktop { padding: 32px 48px; }
    .header-desktop nav { gap: 52px; }

    .hero-content {
      padding: 0 80px 100px;
    }

    .hero-title {
      font-size: 3.4rem;
    }
  }
</style>
</head>
<body>

<!-- Full bleed photo background -->
<div class="hero-bg"></div>
<div class="hero-overlay"></div>
<div class="carob-watermark-wrap wm-subtle"><img src="assets/carob_wordmark.svg" alt="" aria-hidden="true"></div>

<a href="index.html" class="back-link fade-1">&larr; Back to Gallery</a>

<input type="checkbox" id="menu-toggle" hidden>
<label for="menu-toggle" class="hamburger fade-1" aria-label="Menu">
  <span></span><span></span><span></span>
</label>

<div class="mobile-menu">
  <a href="#">Bars</a>
  <a href="#">Moons</a>
  <a href="#">Bananas</a>
  <a href="#">Bites</a>
  <a href="#">Elixirs</a>
  <a href="#">Packs</a>
  <a href="#">Gifts</a>
  <div class="menu-divider"></div>
  <div class="menu-nav">
    <a href="#">Our Story</a>
    <a href="#">Shop</a>
    <a href="#">Stockists</a>
    <a href="#">Recipes</a>
    <a href="#">Contact</a>
  </div>
</div>

<!-- Mobile header (overlaid on photo, no bg) -->
<header class="header-mobile fade-1">
  <div></div><!-- spacer for hamburger -->
  <img src="assets/maplemoon_logo.svg" alt="Maple Moon" class="logo-img" width="40" height="40" loading="lazy" decoding="async">
</header>

<!-- Desktop header (overlaid, cream text, no bg) -->
<header class="header-desktop fade-1">
  <nav>
    <a href="#">Our Story</a>
    <a href="#">Shop</a>
    <a href="#">Stockists</a>
    <a href="#">Recipes</a>
    <a href="#">Contact</a>
  </nav>
  <img src="assets/maplemoon_logo.svg" alt="Maple Moon" class="logo-desktop" width="80" height="40" loading="lazy" decoding="async">
</header>

<!-- Hero content in the dark zone -->
<div class="hero-content">
  <h1 class="hero-title fade-2">MAPLE MOON</h1>
  <p class="hero-tagline fade-3">Naturally sweet carob chocolate</p>
  <a href="#" class="cta-btn fade-3">Shop Now</a>
  <div class="trust-row fade-4">
    <img src="assets/icon_organic.svg" alt="Organic">
    <img src="assets/icon_vegan.svg" alt="Vegan">
    <img src="assets/icon_caffeine_free.svg" alt="Caffeine Free">
    <img src="assets/icon_gluten_free.svg" alt="Gluten Free">
    <img src="assets/icon_made_in_aus.svg" alt="Made in Australia">
  </div>
</div>

<script>
(function() {
  // Mobile menu auto-close
  var toggle = document.getElementById('menu-toggle');
  document.querySelectorAll('.mobile-menu a').forEach(function(link) {
    link.addEventListener('click', function() { toggle.checked = false; });
  });
})();
</script>

</body>
</html>
