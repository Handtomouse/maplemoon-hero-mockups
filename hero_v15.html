<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --grad-top: #7B9DBF;
    --grad-bottom: #A8BDD4;
    --orbit-radius: 120px;
    --node-size: 68px;
  }

  html, body { height: 100%; overflow: hidden; }

  body {
    background: linear-gradient(180deg, var(--grad-top) 0%, var(--grad-bottom) 100%);
    font-family: var(--mm-sans);
    color: var(--mm-cream);
    position: relative;
    min-height: 100vh;
    min-height: 100dvh;
    text-rendering: optimizeLegibility;
    overflow-x: hidden;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .fade-1 { animation: fadeIn 0.8s ease both 0.2s; }
  .fade-2 { animation: fadeIn 0.8s ease both 0.4s; }
  .fade-3 { animation: fadeIn 0.8s ease both 0.6s; }
  .fade-4 { animation: fadeIn 0.8s ease both 0.8s; }

  /* ── Back link ── */
  .back-link {
    position: fixed; top: 16px; left: 16px; z-index: 10;
    color: var(--mm-cream); text-decoration: none;
    font-family: var(--mm-sans); font-size: 0.8rem; font-weight: 400;
    opacity: 0.7; transition: opacity 0.2s;
  }
  .back-link:hover { opacity: 1; }

  /* ── Mobile header ── */
  .header-mobile {
    position: fixed; top: 0; left: 0; right: 0; z-index: 10;
    display: flex; justify-content: space-between; align-items: flex-start;
    padding: 20px;
  }
  .header-mobile .logo-img { width: 40px; height: auto; }

  /* ── Hamburger ── */
  #menu-toggle { display: none; }

  .hamburger {
    position: fixed; top: 12px; left: 12px; z-index: 200;
    cursor: pointer; display: flex; flex-direction: column;
    justify-content: center; gap: 5px; width: 44px; height: 44px;
    padding: 8px;
  }
  .hamburger span {
    display: block; width: 100%; height: 2px;
    background: var(--mm-cream); border-radius: 1px;
    transition: transform 0.3s, opacity 0.3s;
  }
  #menu-toggle:checked ~ .hamburger span:nth-child(1) { transform: rotate(45deg) translate(5px, 5px); }
  #menu-toggle:checked ~ .hamburger span:nth-child(2) { opacity: 0; }
  #menu-toggle:checked ~ .hamburger span:nth-child(3) { transform: rotate(-45deg) translate(5px, -5px); }

  /* ── Mobile menu overlay ── */
  .mobile-menu {
    position: fixed; inset: 0; z-index: 150;
    background: var(--mm-cream); color: var(--mm-navy);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 28px;
    opacity: 0; pointer-events: none;
    transition: opacity 0.3s ease;
  }
  #menu-toggle:checked ~ .mobile-menu { opacity: 1; pointer-events: auto; }

  .mobile-menu a {
    font-family: var(--mm-serif); font-size: 1.4rem;
    font-weight: 500; text-transform: uppercase; letter-spacing: 0.12em;
    color: var(--mm-navy); text-decoration: none;
    transition: opacity 0.2s;
    min-height: 44px; padding: 12px 0;
    display: inline-flex; align-items: center;
  }
  .mobile-menu a:hover { opacity: 0.6; }

  .mobile-menu .menu-divider {
    width: 40px; height: 1px; background: var(--mm-navy); opacity: 0.2;
  }

  .mobile-menu .menu-nav {
    display: flex; flex-direction: column; align-items: center; gap: 20px;
    margin-top: 24px; padding-top: 24px;
    border-top: 1px solid var(--mm-navy-15);
  }
  .mobile-menu .menu-nav a {
    font-family: var(--mm-sans); font-size: 0.95rem;
    font-weight: 400; text-transform: none; letter-spacing: 0.04em;
    color: var(--mm-navy); opacity: 0.6;
  }

  /* ── Desktop nav ── */
  .header-desktop { display: none; }

  /* ── Orbit system ── */
  .orbit-stage {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: calc(var(--orbit-radius) * 2 + var(--node-size));
    height: calc(var(--orbit-radius) * 2 + var(--node-size));
  }

  /* Center wordmark */
  .orbit-center {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    z-index: 3;
    pointer-events: none;
  }
  .orbit-center .wordmark {
    width: 80px;
    height: auto;
    opacity: 0.15;
  }

  /* Rotating ring */
  @keyframes orbit {
    to { transform: rotate(360deg); }
  }
  @keyframes counterOrbit {
    to { transform: rotate(-360deg); }
  }

  .orbit-ring {
    position: absolute;
    inset: 0;
    transition: opacity 0.4s;
  }

  @media (prefers-reduced-motion: no-preference) {
    .orbit-ring {
      animation: orbit 60s linear infinite;
    }
    .orbit-ring .product-node-inner {
      animation: counterOrbit 60s linear infinite;
    }
  }

  .orbit-ring.dimmed {
    animation-play-state: paused;
    opacity: 0.2;
  }
  .orbit-ring.dimmed .product-node-inner {
    animation-play-state: paused;
  }

  /* Product nodes */
  .product-node {
    position: absolute;
    top: 50%; left: 50%;
    width: var(--node-size);
    height: var(--node-size);
    margin-top: calc(var(--node-size) / -2);
    margin-left: calc(var(--node-size) / -2);
    cursor: pointer;
    z-index: 2;
  }

  .product-node:nth-child(1) { transform: rotate(0deg)   translateX(var(--orbit-radius)); }
  .product-node:nth-child(2) { transform: rotate(60deg)  translateX(var(--orbit-radius)); }
  .product-node:nth-child(3) { transform: rotate(120deg) translateX(var(--orbit-radius)); }
  .product-node:nth-child(4) { transform: rotate(180deg) translateX(var(--orbit-radius)); }
  .product-node:nth-child(5) { transform: rotate(240deg) translateX(var(--orbit-radius)); }
  .product-node:nth-child(6) { transform: rotate(300deg) translateX(var(--orbit-radius)); }

  .product-node-inner {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    overflow: hidden;
    border: 2px solid var(--mm-cream-30);
    transition: border-color 0.3s, transform 0.3s;
    background: var(--mm-cream-10);
  }
  .product-node-inner:hover {
    border-color: var(--mm-cream-80);
    transform: scale(1.1);
  }

  .product-node-inner img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  /* ── Info panel (bottom sheet on mobile) ── */
  .info-panel {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: var(--mm-cream);
    color: var(--mm-navy);
    padding: 32px 24px 40px;
    border-radius: 20px 20px 0 0;
    transform: translateY(100%);
    transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    z-index: 20;
    text-align: center;
  }
  .info-panel.visible {
    transform: translateY(0);
  }

  .info-panel .close-btn {
    position: absolute;
    top: 12px; right: 16px;
    background: none; border: none;
    font-size: 1.4rem; color: var(--mm-navy);
    cursor: pointer; opacity: 0.5;
    min-width: 44px; min-height: 44px;
    display: flex; align-items: center; justify-content: center;
  }
  .info-panel .close-btn:hover { opacity: 1; }

  .info-panel .product-name {
    font-family: var(--mm-serif);
    font-weight: 400;
    font-size: 1.4rem;
    letter-spacing: 0.04em;
    margin-bottom: 8px;
  }

  .info-panel .product-desc {
    font-family: var(--mm-sans);
    font-weight: 300;
    font-size: 0.9rem;
    line-height: 1.5;
    opacity: 0.7;
    max-width: 320px;
    margin: 0 auto 20px;
  }

  .info-panel .cta-btn {
    display: inline-flex; align-items: center; justify-content: center;
    border: 1.5px solid var(--mm-navy); color: var(--mm-navy);
    background: transparent; border-radius: var(--radius-pill);
    padding: 12px 32px; min-height: 48px;
    font-family: var(--mm-sans); font-size: 0.85rem;
    font-weight: 400; letter-spacing: 0.06em; text-transform: uppercase;
    text-decoration: none; cursor: pointer;
    transition: background 0.3s, color 0.3s;
  }
  .info-panel .cta-btn:hover {
    background: var(--mm-navy); color: var(--mm-cream);
  }

  /* ── Tagline below orbit ── */
  .orbit-tagline {
    position: absolute;
    bottom: 80px; left: 0; right: 0;
    text-align: center;
    z-index: 3;
  }
  .orbit-tagline p {
    font-family: var(--mm-sans);
    font-weight: 300;
    font-size: 0.85rem;
    opacity: 0.6;
    letter-spacing: 0.04em;
  }

  /* ── Trust row ── */
  .trust-row {
    position: absolute;
    bottom: 32px; left: 0; right: 0;
    display: flex; align-items: center; justify-content: center; gap: 14px;
    z-index: 3;
  }
  .trust-row img {
    width: 20px; height: 20px;
    filter: brightness(0) invert(0.92) sepia(0.1) saturate(0.3);
    opacity: 0.5;
  }

  /* ── Watermark ── */
  .carob-watermark-wrap {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    z-index: 0;
  }

  /* ── DESKTOP ── */
  @media (min-width: 768px) {
    :root {
      --orbit-radius: 200px;
      --node-size: 96px;
    }

    .hamburger { display: none; }
    .header-mobile { display: none; }

    .header-desktop {
      display: flex; align-items: center;
      position: fixed; top: 0; left: 0; right: 0; z-index: 10;
      padding: 28px 40px;
      background: transparent;
    }
    .header-desktop nav {
      flex: 1; display: flex; align-items: center;
      justify-content: center; gap: 40px;
    }
    .header-desktop nav a {
      font-family: var(--mm-sans); font-size: 1rem;
      font-weight: 400; color: var(--mm-cream); text-decoration: none;
      opacity: 0.9; transition: opacity 0.2s;
    }
    .header-desktop nav a:hover { opacity: 0.6; }
    .header-desktop .logo-desktop {
      width: 80px; height: auto; margin-left: auto; flex-shrink: 0;
    }

    .orbit-center .wordmark {
      width: 120px;
    }

    /* Info panel as side card on desktop */
    .info-panel {
      top: 50%; bottom: auto;
      left: auto; right: 60px;
      width: 320px;
      transform: translate(0, -50%) scale(0.9);
      opacity: 0;
      border-radius: var(--radius-md);
      padding: 40px 32px;
      transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.3s;
    }
    .info-panel.visible {
      transform: translate(0, -50%) scale(1);
      opacity: 1;
    }

    .orbit-stage {
      left: 40%;
    }
  }

  @media (min-width: 1024px) {
    :root {
      --orbit-radius: 240px;
      --node-size: 104px;
    }

    .header-desktop { padding: 32px 48px; }
    .header-desktop nav { gap: 52px; }

    .orbit-stage {
      left: 42%;
    }
  }
</style>

<!-- Info panel -->
<div class="info-panel" role="region" aria-label="Product details" aria-hidden="true">

  <h2 class="product-name"></h2>
  <p class="product-desc"></p>
  <a href="/shop" class="cta-btn">View Product</a>
</div>

<script>
(function() {
  if (!('IntersectionObserver' in window)) {
    document.querySelectorAll('[class*="fade"]').forEach(function(el) { el.style.opacity = '1'; });
  }

  var ring = document.querySelector('.orbit-ring');
  var nodes = document.querySelectorAll('.product-node');
  var panel = document.querySelector('.info-panel');
  var panelName = panel.querySelector('.product-name');
  var panelDesc = panel.querySelector('.product-desc');
  var panelCta = panel.querySelector('.cta-btn');
  var closeBtn = panel.querySelector('.close-btn');

  function openProduct(node) {
    panelName.textContent = node.getAttribute('data-name');
    panelDesc.textContent = node.getAttribute('data-desc');
    panelCta.href = node.getAttribute('data-href');
    ring.classList.add('dimmed');
    panel.classList.add('visible');
    panel.setAttribute('aria-hidden', 'false');
    closeBtn.focus();
  }

  function closeProduct() {
    ring.classList.remove('dimmed');
    panel.classList.remove('visible');
    panel.setAttribute('aria-hidden', 'true');
  }

  nodes.forEach(function(node) {
    node.addEventListener('click', function(e) {
      e.stopPropagation();
      openProduct(node);
    });
  });

  closeBtn.addEventListener('click', function(e) {
    e.stopPropagation();
    closeProduct();
  });

  document.addEventListener('click', function(e) {
    if (panel.classList.contains('visible') && !panel.contains(e.target)) {
      closeProduct();
    }
  });

  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape' && panel.classList.contains('visible')) {
      closeProduct();
    }
  });

  // Mobile menu
  var toggle = document.getElementById('menu-toggle');
  var menu = document.querySelector('.mobile-menu');
  var hamburger = document.querySelector('.hamburger');

  document.querySelectorAll('.mobile-menu a').forEach(function(link) {
    link.addEventListener('click', function() { toggle.checked = false; toggle.dispatchEvent(new Event('change')); });
  });

  toggle.addEventListener('change', function() {
    var isOpen = toggle.checked;
    menu.setAttribute('aria-hidden', isOpen ? 'false' : 'true');
    hamburger.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
    if (!isOpen) { hamburger.focus(); return; }
    var focusable = menu.querySelectorAll('a, button, [tabindex]');
    if (!focusable.length) return;
    var first = focusable[0], last = focusable[focusable.length - 1];
    function trap(e) {
      if (e.key === 'Escape') { toggle.checked = false; toggle.dispatchEvent(new Event('change')); return; }
      if (e.key !== 'Tab') return;
      if (e.shiftKey) { if (document.activeElement === first) { e.preventDefault(); last.focus(); } }
      else { if (document.activeElement === last) { e.preventDefault(); first.focus(); } }
    }
    menu.addEventListener('keydown', trap);
    first.focus();
    var obs = new MutationObserver(function() {
      if (!toggle.checked) { menu.removeEventListener('keydown', trap); obs.disconnect(); }
    });
    obs.observe(toggle, { attributes: true });
  });
})();
</script>
